body:
  text: 辨初生脈證並治第一兒初生肌膚至紅啼聲吃吃胸腹堅硬者此為熱毒所致兒生下身體石硬啼聲沉濁者此為寒毒所致兒落草肌肉淡白啼聲微細者此為虛質難養也兒始生發黑體實遍身順和啼聲高朗者為無病也兒口內含瘀濁先急拭去而宜與甘連湯以吐若瀉也初生肌膚淡白啼聲虛微者為血氣所虧也宜五香湯主之五香湯方丁香三分藿香二分木香二分沉香三分紅花三分甘草二分上六味以沸湯五合漬之須臾絞去滓分溫服兒為純陽若身紅如然及胸腹石硬者宜甘連湯主之甘連湯方甘草三分黃連二分大黃三分上三味以沸湯漬之須臾絞去滓用綿纏子釀以令兒吮之兒初生無脈周時微動也嬰兒脈大指下六七至是為常脈也兒脈亂髫一息七八至為無病也童草脈一息五六至為常脈也兒初生二晬時則與乳而可若速與乳則使毒內伏遂為瘡疹之病也兒生下黑便當續出若稠黏而少者甘連加大黃湯主之兒落草胸腹石硬者為毒多宜攻擊方兒濁便竭者可與乳餌不竭者未可與乳餌若誤與者後必致胎毒之病也兒初浴後六日而浴爾後隔日而浴三七後減浴若妄浴者致風寒之病也落臍後濕爛者為惡侯也桃花箋傳之兒初生妄灸者發驚無病不可逆灸也落帶後欲浴者宜文蛤油敷之文蛤油方川文蛤一錢甘草一分上二味研篩調清油敷之兒初生臍瘡出血啼叫不安者以白石脂研敷之兒初生乳汁稀少飼以它物則致乳癖或驚疳瀉痢之病也兒初生遍身微冷啼聲不發者宜蜜附湯主之蜜附湯方人參三分蜜香三分附子二分乾薑二分上五味以水一升煮取七合去滓分溫服兒初生哺飯者以周歲為可法用陳米飯始哺之要研爛如泥與乳每日與一二匙漸至完飯兒四五歲者不與乳而無妨二三歲者未可斷乳若強斷則致疳癖之病也兒顱門跳動者為筋骨不實宜五香加殭蠶湯主之兒身體羸弱肌膚乾燥者宜活血湯主之活血湯方當歸一錢芍藥一錢紅曲五分甘草三分上四味以水一升煮取七合去滓分溫服兒顱成八字名解顱此為缺乳所致也兒溏瀉真陽必陷降遂致囟陷者健骨湯主之兒語遲屬口軟行遲屬腳軟此為體氣虛缺所致宜健骨湯主之健骨湯方人參二分當歸五分白殭蠶五分連蕊二分野蠶三分甘草二分生薑二分上七味以水一升煮取七合去滓分溫服兒口瘡加雪為白雪瘡腹中飢欲乳口為妨用羅纏指頭釀薄荷湯以屢拭宜火濟湯火濟湯方黃連三分黃芩三分黃柏二分梔子二分炒茉莉白二分上五味以水一升煮四味取七合去滓內茉莉白攪調分溫服兒鵝口者即白雪瘡也若喉內腫者名乳蛾有雙單俱胎毒熱灼所致宜火炭母湯火炭母湯方火炭母一錢大黃芒消各三分桔梗五分甘草二分上五味以水一升煮四味取七合去滓內芒消攪調分溫服乳蛾咽腫熱痛啼聲不出乳餌不能者碧雪主之碧雪方芒消六兩寒水石一兩青果十個去核甘草半兩研上四味以水一斗煮至半鬥內藍板以色碧為度不住手攪和勻傾盆內經宿凝成雪研末每含咽三分或以水服一錢七兒初生臍瘡若遺毒蝕爛者宜桃花箋貼之桃花箋方石灰二兩上一味以雪水五升漬二旬加辰砂攪調色如桃花為度以釀箋子一旬曬乾寸裂貼患處兒舌下腫尖如小舌名曰重舌此為熱毒所致急用鈹針刺之血出當差仍灸廉泉若再發者以不灸故也兒初生元陽未實若乳餌失節若努力啼號必臍尖名曰臍突宜消疳湯臍尖如旋螺脈數實者枳芍加芒消湯主之枳芍加芒消湯方枳實三分芍藥五分炒芒消三分上三味以水一升煮取七合去滓分溫服兒初生眼目不開脈必數若大便難此為胎熱所致宜甘連加大黃湯敷以熊膽汁兒初生皮肉鎖其穀道此為鎖肛法急割破大便當通若不通者難治兒變蒸此為胎毒散宜紅花湯主之紅花湯方紅花三分大黃三分黃連三分芒硝三分甘草二分上五味㕮咀以水一升煮取七合去滓分溫頻頻服兒交奶為病必發熱或有㿍者即是也宜犀角消毒湯犀角消毒湯方犀角二分荊芥五分防風五分牛房子五分甘草二分上五味以水一升煮五味取七合去滓內犀角屑攪調分服兒初生身熱不解大便如膠名曰胎熱必發口瘡若劇者發丹毒宜紅花湯主之諸熱溫溫元真昏晦者發驚若蟲動若胎毒亦發驚兒初生身熱四五日紅班簇簇者為丹毒宜火濟加辰砂湯兒初生身體肥厚反筋骨乏力名曰胎肥宜大麥煎主之大麥煎方茯苓五分砂仁三分馬舄三分麥芽五分上四味以水一升先煮麥芽減二合內諸藥再煮取六合去滓分溫服兒始生露骨柴削晨暮啼躁不安名曰胎瘦宜養肝湯養肝湯方縮砂五分茯苓五分紅曲三分白朮三分生薑二分上五味以水一升煮取五合去滓如蜂蜜一匙攪調分溫服兒初生面體痝然浮肥其色鮮明者為胎肥茯苓加桃花飲主之兒初生臍未乾屢治為濕邪所襲遂發熱而驚名曰臍風宜還魂加辰砂湯兒臍風必發驚短息喘鳴者麻杏甘石湯主之麻杏甘石湯方麻黃五分杏仁五個甘草三分石膏一錢上四味以水一升先煮麻黃二三沸去上沫內諸藥煮取七合去滓分溫服兒初生發驚脈弦痰喘張口胸滿嘔而煩不能乳者紫霜丸主之紫霜丸方代赭石二錢醋碎石脂二錢巴豆二錢去皮油杏仁四錢上四味相和搗糊丸嬰粟大每服二三丸兒生下頭大頸細若目多白睛面㿠白身體瘦者多愁少喜也兒初生遍身赤胸腹硬啼聲吃吃者必發驚兒初生身冷膚硬啼聲嗄名曰硬體此為陰毒也兒生下脈微續者為佳若妄出者難養兒初生啼聲綿綿相續者為有壽也兒啼聲絶復揚急者為腹痛也兒啼是歌蓋胎毒散也兒初生卵縫總黑者為實浮白若腫大者為虛兒頸細者致夭橫腹硬者亦致夭橫兒初生體膚如石硬名曰五硬胎毒凝結令然厥冷而聲不發者死兒始生身體軟弱而無力為筋骨不成名曰五軟宜健骨湯主之臘內臍風發驚而嘔者不可治百晬咳喘亦不可治嬰孩腦後發瘡如雞子大紅紫而焮熱名曰腦瘡死兒生下無肛者為鎖肛急割之鎖肛者生鎖肚者死辨寒熱脈證並治第二寒熱之為候有風濕有瘡疹有宿食有驚動皆能發寒熱須要別論以無令誤也病人發熱惡寒脈緩者名曰感風病或已發熱或未發熱必惡寒體痛嘔逆脈陰陽俱緊者名曰傷寒兒灑淅惡寒毛聳身厥者發大熱脈急弦者發驚病人惡寒而振反發熱濈然汗出而解者瘟病也病人寒栗鼓頷反發熱汗流而解反復必期時者為瘧疾也發熱惡寒身振栗而無汗面紅尻冷者為痘疹脈緊者必發驚兒發熱嘔乳面紅神昏睡則惕跳者為客忤也兒身熱腹滿必吐乳脈滑而實者為食飪所傷發驚兒發熱啼哭緩急交作握拳齧齒者為腹痛也兒發熱有時其熱睡則益盛者以蟲動所致也兒微熱啼號嘔乳發作肌膚漸甲錯者為缺乳也病人脈細而數或渴或溏元真昏晦身熱鬱郁睡反益劇者草果飲主之草果飲方草果三分檳榔五分柴胡一錢黃芩三分小連翹五分生薑三分大棗二枚上七味以水一升煮取七合去滓分溫服兒身體微熱若哯乳反氣力如故者為交奶必發疹也兒熱鬱必發口瘡如疳熱痢熱發走馬疳醫須要屢視其口內也兒發熱惡風鼽嚏鼻塞若咳喘吐乳若微搐夜臥不安者惺惺散主之惺惺散方人參二分白朮三分茯苓五分桔梗五分天花粉三分細辛二分薄荷一分甘草三分上八味㕮咀以水一升煮取七合去滓分溫服兒鬾病者乃飲母鬾乳所致宜逐疳湯逐疳湯方青皮茯苓各一錢白朮使君子紅曲炒各五分甘草三分上五味以水一升煮取七合去滓分溫服兒交奶傷與五香湯發㿍者與犀角消毒飲惡寒發熱鼻鳴乾嘔者桂枝湯主之桂枝湯方桂枝二分芍藥一錢甘草三分生薑二分大棗二枚上五味㕮咀以水一升煮取七合去滓適寒溫分服須臾啜熱稀粥以助藥力溫敷令汗出若不汗更服服桂枝湯大汗出脈洪大者與桂枝湯如前法若形如瘧日再發者汗出必解宜桂枝二麻黃一湯太陽病項背強几几無汗惡風葛根湯主之葛根湯方葛根五分麻黃三分桂枝二分芍藥五分甘草二分生薑二分大棗二枚上七味㕮咀以水一升先煮麻黃葛根減二合去沫內諸藥煮取七合去滓溫服將息及禁忌傷寒身熱睛不了了致衄血若發驚是以陽氣重故也傷寒脈浮緊無汗反致衄者欲解也宜麻黃湯主之太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之麻黃湯方麻黃五分桂枝三分甘草二分杏仁八個上四味以水二升先煮麻黃減五合去上沫內諸藥煮取一升去滓溫服復取微似汗如桂枝法將息大陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之大青龍湯方麻黃二錢桂枝五分甘草三分杏仁八個生薑三分大棗三枚石膏如彈丸大上七味以水二升先煮麻黃減五合去上沫內諸藥煮取一升去滓溫服五合取微似汗若不汗再三作劑汗出多者停後服傷寒陽且證醫服陽且湯尚不汗者以氣運未適故也須續服前方後得氣運適者肌肉即和諧仍濈濈汗出也大陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者桂枝加附子湯主之傷寒六七日發熱微惡寒支節煩疼微嘔心下支結外證未去者柴胡加桂枝湯主之傷寒五六日若中風往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔或胸中煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳者與小柴胡湯主之小柴胡湯方柴胡一錢黃芩五分人參三分甘草三分半夏一錢生薑三分大棗三枚上七味以水二升煮減七合去滓再煎取一升分溫服大陽病發汗後大汗出胃中干煩燥不得眠欲得飲水者少少與飲之令胃氣和則愈若脈浮小便不利微熱消渴者與五苓散主之五苓散方豬苓五分澤瀉五分茯苓三分桂枝三分白朮五分上五味為末以白飲和服方寸七日三服多飲暖水汗出愈潮熱者實也先宜小柴胡湯以解外後以柴胡加芒消湯主之潮熱鬱郁嘔不止小便赤者柴胡加芒消湯主之傷寒病若吐若下後七八日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之傷寒脈滑肌膚大熱反大便溏小便白此為真熱假寒候宜白虎湯主之大陽病過經十餘日反二三下之後四五日柴胡證仍在者先與小柴胡湯嘔不止心下急鬱郁微煩者為未解也與大柴胡下之則愈大柴胡湯方柴胡二錢黃芩五分大黃五分芍藥一錢半夏五分生薑三分枳實五分大棗二枚上八味以水二升煮取一升去滓再煎分溫服發汗後惡寒者虛故也不惡寒但熱者實也當和胃氣與調胃承氣湯調胃承氣湯方大黃一錢甘草五分芒消五分上三味㕮咀以水二升煮取一升去滓內芒消更上火微煮令沸少少溫服陽明病其人多汗以津液外出胃中燥大便必硬硬則譫語小承氣湯主之若一服譫語止更莫復服小承氣湯方大黃一錢厚朴四分枳實五分以上三味以水二升煮取一升去滓分溫服初服湯當更衣不爾者盡飲之若更衣者勿服之傷寒六七日目中不了了睛不和無表裡證大便難身微熱此為實也宜大承氣湯大承氣湯方大黃一錢厚朴四錢枳實五分芒硝三分上四味以水二升先煮二物減五合去滓內大黃煮取一升去滓納芒硝更上火微一兩沸分溫再服病位於開者桂枝湯所適也位於闔者承氣湯所適也位於樞者柴胡湯以和之病人振寒大熱流汗而解三日若四日再三發作如故此為溫毒所致宜達元飲主之達元飲方檳榔五分厚朴五分知母三分芍藥五分黃芩三分草果三分甘草二分上七味以水二升煮取一升去滓分溫服傷寒解後虛羸少氣氣逆欲吐者竹葉石膏湯主之竹葉石膏湯方竹葉七葉石膏五分半夏五分人參三分甘草二分粳米三分麥門冬五分上七味以水二升煮取一升去滓內粳米煮米熟湯成去米溫服病人脈微弱而氣逆面紅小便難時時嘔不食者犀角辰砂湯主之犀角辰砂湯方茯苓一錢犀角五分辰砂三分食鹽二分生薑三分上五味以水一升煮取七合去滓分溫服大陽病二三日振寒而汗出一身涼和反脈弦緊此為瘧疾也大陽病熱忽退身涼頭痛未歇者為瘧邪也病人惡寒脈數而弦腕冷如灌水者必瘧疾也柴胡乾薑桂枝湯主之柴胡乾薑桂枝湯方柴胡五分黃苓三分半夏五分桂枝三分乾薑二分生薑二分人參二分大棗二枚甘草二分上九味以水二升煮取一升去滓分溫服瘧病必振寒而發熱休作難愈者食鮧魚為妙附子摩散主之附子摩散方附子一塊去皮上一味研如泥醋調發前一時敷脊骨自驗瘧疾若溫病虛羸少氣氣逆欲吐小便必赤若足熱此為餘熱未解宜竹葉石膏湯主之瘧病夜發者法出血中之邪宜桂枝加桃仁當歸湯若欲截邪者斬鬼丹主之斬鬼丹方黃丹研獨頭大蒜研如泥上二味同搗為丸發日五更以水五合服一錢匕傷寒若瘟疫發汗而復下之胸脅滿微結小便不利渴而不嘔伹頭汗出往來寒熱心煩者此為未解也柴胡桂枝幹薑湯主之柴胡桂枝幹薑湯方柴胡五分桂枝三分乾薑三分栝蔞根三分黃芩三分牡蠣三分甘草二分上七味以水一升煮取七合去滓再煎二三沸分溫服風濕相搏身體疼煩不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之甘草附子湯方甘草五分附子三分白朮五分桂枝三分上四味以水一升煮取七合去滓分溫三服風濕在表者開鬼門在裡者潔淨腑宜滲濕湯滲濕湯方仙遺糧二錢半生半炒茯苓一錢黃柏黑炒三分生薑三分大棗二枚上五味以水二升煮取一升去滓分溫服濕家身煩疼可與麻黃加朮湯發其汗為佳慎不可以火攻之麻黃加朮湯方麻黃五分桂枝三分甘草二分杏仁七個白朮五分上五味以水二升先煮麻黃減五合去上沫內諸藥煮取一升去滓溫服復取微似汗皮水為病四肢腫水氣在皮膚中四肢聶聶動者防己茯苓湯主之防己茯苓湯方防己一錢黃耆五分桂枝三分茯苓一錢甘草二分上五味以水二升煮取一升去滓分溫三服陽明病發熱汗出此為熱越不能發黃也但頭汗出身無汗劑頸而還小便不利渴引水漿者此為瘀熱在裡身必發黃茵陳湯主之茵陳湯方茵陳蒿二錢梔子一枚大黃五分上三味以水二升先煮茵陳減五合內二味煮取一升去滓分溫三服小便當利尿如皂角汁狀色正赤一宿腹減黃從小便去也諸病黃家但利其小便茵陳五苓散主之茵陳五苓散方茵陳蒿一錢五苓散一錢上二物以水二升煮取一升去滓分溫服黃家所得從濕得之一身盡黃發熱煩喘胸滿口燥者生蘿蔔取之諸病黃家假令脈浮當以汗解之熱在裡當下之以汗解之宜桂枝加葛根湯欲下之宜大承氣湯夏熱所傷頭痛身熱脈微浮而小便如血宜黃連香薷飲主之黃連香薷飲方香薷三分厚朴五分黃連三分白扁豆五分炒甘草二分生薑三分大棗三枚上七味以水一升煮取七合去滓分溫服大陽中熱暍足也脈浮而渴若睡中微搐若小便澀者五苓散加辰砂三分服之夏月伏熱煩渴脈微數若瀉黃者大順散主之大順散方桂枝四錢杏仁四錢乾薑四錢甘草二錢上四味搗研篩每服一錢七以白飲服兒體羸弱少氣力適感觸夏熱客邪食真遂飧泄而脈微弱者解暑補真湯主之解暑補真湯方黃耆五分蜜炒參葉三分甘草三分五味子十個麥門冬五分黃連二分茯苓五分白朮三分陳皮五分上九味以水一升煮取七合去滓分溫服暴卒腹痛若霍亂吐瀉四肢厥者宜藿香飲藿香飲方藿香三分木香三分益知三分白朮三分木瓜三分食鹽二分上六味以水二升煮取一升去滓分溫服身熱焰焰煩渴舌焦脈滑而數小便如血宜白虎加人參葉湯主之喝病身熱煩悶大渴少氣倦怠或霍亂昏眩吐瀉冷汗者濕霍亂也不吐瀉者此為乾霍亂難治紫霜丸服之傷寒若中喝吐利汗出發熱惡寒四肢拘急手足厥冷者四逆湯主之四逆湯方附子三分乾薑三分甘草三分上三味㕮咀以水一升煮取七合去滓分溫再服少陰病下利清穀裡寒外熱手足厥逆脈微欲絶身反不惡寒面赤色或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之通脈四逆湯方甘草五分附子五分乾薑五分上三味以水二升煮取一升去滓分溫再服其脈即出者愈身體暴厥以陰陽難順接故也若脈滑而厥者熱厥也宜白虎加桂枝湯少陰病吐利手足厥冷煩躁欲死者吳茱萸湯主之吳茱萸湯方吳茱萸五分人參五分生薑五分大棗二枚上四味以水二升煮取一升去滓溫服病人奄忽而厥者發大熱前熱者後必厥厥劇者熱亦劇厥微者熱亦微紫霜丸導之病胸腹硬痛額汁出四肢厥寒此為食厥宜急吐之發汗若下之陰虛陽暴絶病仍不解煩燥者茯苓四逆湯主之茯苓四逆湯方茯苓五分人參二分甘草二分乾薑五分附子五分上五味以水二升煮取一升去滓分溫服吐已下斷汗出而厥四肢拘急不解脈微欲絶者通脈四逆加豬膽汁湯主之傷寒脈浮身汗出小便數心煩微惡寒腳攣急反與桂枝湯欲攻其表此誤也得之便厥咽中干煩燥吐逆者作甘草乾薑湯與之以復其陽甘草乾薑湯方甘草三分乾薑三分上㕮咀以水一升煮取七合去滓分溫服發汗病不解反惡寒者虛故也若四肢攣拘而微厥者宜芍藥甘草附子湯主之芍藥甘草附子湯方芍藥二錢甘草五分附子五分以上三味以水二升煮取一升去滓加蜜一匙分溫服蛔厥者當吐蛔令病者靜而復時煩此為藏寒蛔上入膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人當自吐蛔烏梅丸主之烏梅丸方烏梅二百個細辛六兩乾薑十兩黃連一斤當歸四兩附子六兩炮川椒四兩去仁桂枝六兩人參黃柏各六兩上十味異搗篩合治之以苦酒漬烏梅一宿去核蒸之五升米下飯熟搗成泥和藥令相得內臼中與蜜拌二千下丸如梧子大先食飲服十丸三服稍加至二十丸禁生冷滑臭等食病人腹滿身熱合面倦臥其脈細數雖腹硬不可攻之宜柴胡平胃湯柴胡平胃湯方柴胡五分黃芩三分人參三分甘草三分半夏五分生薑二分蒼朮三分陳皮五分厚朴五分上九味㕮咀以水二升煮取一升去滓分溫頻頻服潮熱反復腹硬而肉脫轉屬疳病壞病也宜消疳湯主之虛勞悸衄身體微熱四肢痠痛者當皈建中湯主之當歸建中湯方當歸五分芍藥五分桂枝三分生薑二分甘草三分大棗二枚上六味以水二升煮取一升去滓內膠飴更上微火消解溫服三合日三服氣血兩衰鬱火起伏胸硬腹弱少氣悸動兼主眼目不了了者宜枸杞涼肝湯枸杞涼肝湯方枸杞厚朴香附子各一錢茯苓二錢黃柏甘草各五分上九味以水二升煮取一升去滓分溫服羸瘠之氣腰腹拘急四肢沉重咽乾唇燥面顏少色二脈不足者黃耆建中湯主之身熱發作氣血消爍若煩渴真熱假熱俱既濟湯主之既濟湯方生地黃五錢搗碎黃連五分上二味以水二升煮取一升去滓分溫服若渴劇者冷服真熱加石膏假熱加人尿譫語加辰砂身體血燥暮時潮熱吸吸咳喘喉內痰響者鹿角菜湯主之鹿角菜湯方鹿角菜鱉甲牛皮消各二錢犀角五分竹菰三分甘草三分上六味以水一升煮五味減三合去滓內犀角攪調分溫服少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者此為有水氣其人或咳或小便利或下利或嘔者真武湯主之真武湯方茯苓五分芍藥五分生薑三分白朮三分附子三分上五味以水二升煮取一升去滓分溫服大逆上氣咽喉不利止逆下氣者麥門冬湯主之麥門冬湯方麥門冬五分半夏五分人參三分甘草二分粳米五分大棗三枚上六味以水一升煮取七合分溫服大熱口焦譫語欲死者極於陽也厥冷鄭聲須悸欲死者極於陰也病屬陰脾氣衰弱口內乾燥嘔而不食其舌恰如鳥肉名曰濡舌試以芡實湯主之芡實湯方芡實微炒五分參葉三分蓮蕊五分上三味以水一升煮取七合去滓分溫加薑汁服之傷寒若痢疾雖客熱稍解其脾氣遂失運行食飲不思者當含嚼桐斷令以延胃氣也病發於陽引日者多佳兆也病發於陰引日者多惡候也病自外動者候在於鼻也自里動者候在於口也病人體羸脾衰脈微弱食飲難進者宜蘿蔔粥蘿蔔粥方陳米不拘多少蘿蔔去皮研作泥等分上二味先以水煮陳米作稀粥內蘿蔔調和再上火四五沸夫實則譫語虛則鄭聲鄭聲重語也劇者撮空循衣此為氣血兩敗也養榮湯主之養榮湯方人參三分黃耆三分麥門冬五分五味子五分當歸五分地黃五分甘草三分上七味以水二升煮取一升分溫服虛逆者加人尿厥冷者加附子病人煩苦忽斷食者尚可治無煩苦漸失食者雖今少食不可治兒腹癖胸滿小便如米泔其脈緊弦細數或能食反羸瘠者不可治兒骨蒸潮熱頸細腹大眼睛無神足跗微腫者死蛔厥驚呼煩渴而昏沉試捻之仍不醒者為死候也厥冷煩渴面赤吐利不休小便如血者不可治病態隨時變動假令朝劇暮安若胸脅攣急劇則四肢厥冷此為癇厥也四逆散主之柳肝加膠飴散亦主之四逆散方甘草枳實柴胡芍藥上四味各十分搗篩白飲和服方寸匕或加膠飴攪調服之病人體瘦脈微面郁赤如醉狀四肢冷咂口捻衣此為陽絶也病人身熱飲食不能反欲飲酒者少少與飲但勿令意極也諸病解後脾氣必衰弱要慎飲食若妄飼者致食復夏月腹痛煩燥若暴泄身忽厥反眼跳動元陽欲脫者為直中灸之陽復者生不復者死暍之為恙多脫症須要春夏交服健脾劑此謂豫防何以論之曰暍病必發於吐瀉故也食厥腹痛劇者必反覆顛倒脈結欲死者要吐瀉宜紫霜丸主之暴泄忽厥脈微額汗出者灸天樞湧泉厥不還脈不鼓反微喘者死病人煩動大汗出脈陰陽俱盛者死體羸食減脈陰陽俱虛身熱不解者死諸病勞復二三若自復若擊天和者俱不可治病人脈浮而洪身汗如油喘而不休水漿不下體形不仁乍靜乍亂此為命絶也辨發驚脈證並治第三問曰驚有陽有陰何以別之答曰兒肝氣實盛適與風氣相搏竄視反張脈浮而弦者名曰陽癇也兒元真虛弱肝氣獨亢睡惕露睛脈細而弦者名曰陰癇也兒風熱傷食若瘡熱蟲動是皆發驚跳以元真不勝任也陽癇為病大熱皆強上竄撮口四肢必瘛瘲者還魂湯主之還魂湯方麻黃五分杏仁五核芍藥一錢釣藤三分射干三分甘草二分上五味以水一升煮取七合去滓分溫頻頻服兒啼聲輕者氣也弱也重濁者痛也高喊者熱欲狂也聲急者神驚也聲塞者痰也聲戰者寒也兒發熱頰赤瞌睡跳惕齧齒咬乳者宜釣藤湯主之兒體熱面無色反折而啼號者欲驚也陽癇為病角弓反張直視而脈促若劇者厥寒欲死須要截風去痰若熱不減減不足言當急攻之大承氣湯主之惡寒發熱若呵缺面赤無汗而脈盛大者必致驚惕宜大青龍湯主之兒發驚痰涎壅盛短息煩躁腹硬脈弦者宜紫霜丸導以減其盛氣也馬脾風即肺脹也搖肩滾肚張口喘鳴者宜鐵漿加薑汁服之身熱昏沉咽內如水雞聲脈促面赤者欲驚宜麻黃杏仁甘草石膏加射干湯主之驚之為病有上竄瘛瘲者發於陽也有下竄微搐者發於陰也兒昏沉五六日吐乳跳惕身熱不解奄忽發驚者病反瘥若不瘥直視休作者難治也兒驚跳似寒似熱似嘔似瀉名曰陰陽合病宜與芍藥甘草湯以將息也驚病恍惚手腳偏動吐若瀉其脈微澀此為陰陽俱虛不可更汗更攻宜通脈四逆加豬膽汁湯主之兒微熱瞌睡必露睛四肢致動惕此為慢驚之兆也兒身體微熱慢跳休作溏瀉遺溲此為純陰也宜四逆加人參湯主之兒一身微冷反指頭熱此為熱厥必發大熱若驚搐也病真熱者陽也假熱者陰也陽者發急驚陰者發慢驚急驚者宜寒瀉方慢驚者宜溫養方驚病身熱力猛者為陽癇身冷力劣者為陰癇若劈地而作聲口流涎者癲癇也驚之為病仰視者為天吊內視者為內吊角弓反張脈數疾者為痘病也驚病者須要扶持而將息若強擒捉則邪熱益激遂迫入骨假令病瘥必手腳攣拘也發熱竄視痰涎潮盛口噤瘛瘲此為榮衛凝結百脈不通故暴烈也驚有陽有陰天釣者為熱陽也內釣者似癇陰也兒發驚脈浮數洪緊弦為急驚也脈沉遲散緩微為慢驚也急驚緩治之宜寒冷方慢驚急治之宜溫熱方兒初生哯乳惕而不安此為胎驚宜朱蜜朱蜜方硃砂豆大蜂蜜雞子大上二味研調每日含之日二三次臘內直視齘齒手腳拘急脈促弦者為胎驚宜紫雪主之紫雪方黃金十兩寒水石四兩八錢石膏四兩八錢玄參一兩犀角一兩羚羊角一兩甘草八錢升麻六錢沉香五錢木香五錢丁香五錢上十一味以水五斗先煮黃金及二石至三斗入諸藥再煎至一斗去滓入芒硝三兩二錢慢火煎以柳枝不住手攪侯欲凝入瓷盆中更下硃砂麝香各三錢急攪自然凝成紫雪為度臘內發驚假者可治真者不可治何以論之曰假者為風外也真者為癇里也客忤者客氣忤犯其主氣之謂也發熱哯乳睡必微跳宜惺惺散主之客忤發熱微搐若劇則如狂癇反視撮口惕而不安宜紅雪服之兒人語物響易動跳者此為元真虛拙必發驚癇也宜竹筎溫膽湯主之竹筎溫膽湯方茯苓一錢陳皮五分半夏七分黃連三分枳實五分竹筎三分甘草二分生薑三分大棗五枚上九味㕮咀以水二升煮取一升去滓分溫服加辰砂三分為佳兒善怒啼哭腳腹攣拘脈必沉弦劇則齧齒咬乳此為蟲驚宜芍藥甘草湯蟲驚如癇恕號而顏紅胸脅必攣拘脈乍動乍靜者是也宜柳肝加膠飴湯柳肝加膠飴湯方柴胡五分川芎三分當歸五分白朮三分茯苓五分釣藤五分甘草三分膠飴雞子大上八味以水二升煮七味取一升去滓內膠飴更上微火消解溫服日三服身溫睡多胸腹滿而微惕或食臭或嘔逆者宜厚朴三物湯兒體壯熱面赤尻冷寒栗而振奄忽發驚此為痘疹兆也宜續命湯主之續命湯方葛根五分麻黃三分桂枝二分芍藥五分釣藤三分黃連二分石膏五分甘草三分生薑二分大棗三枚上十味以水二升先煮麻黃葛根減五合去沫內諸藥煮取七合去滓分溫服兒膚有瘡發熱而驚者名曰破傷風即痓病也宜續命湯若身厥者芍藥甘草附子湯主之病者身熱無汗而小便反少氣上衝胸口噤不得語欲作剛痓葛根湯主之病者身熱足寒頸項強急惡寒時頭熱面赤目赤獨頭動搖卒口噤背反張者痓病也若發其汗者寒濕相得其表益虛即惡寒甚發其汗已其脈如蛇太陽病發汗大多若亡血虛家俱致痓病宜黃耆建中湯主之痓為病胸滿口噤臥不著席腳攣急必齘齒可與大承氣湯主之大陽中熱者喝是也汗出惡寒身熱而渴劇者竄視反張宜白虎加人參湯喝病發熱面赤而哽其脈弦細芤遲小便已灑灑然毛聳手足逆冷咽燥口乾若發其汗則其惡寒甚加溫針則發熱甚宜生脈散主之生脈散方人參三分麥門冬五分五味子三分炒上三味以水一升煮取七合去滓加薑汁若竹瀝攪調頻頻服暍病煩渴而顏赤脈促者欲驚宜黃連白虎湯暴卒中暍直視失㙇四肢厥寒者附子理中湯主之附子理中湯方人參三分白朮五分附子五分乾薑五分甘草三分上五味㕮咀以水一升煮取七合去滓分溫服諸暴病反眼瘛瘲若痰喘短息不論陰陽先與人參黃連湯人參熊膽湯亦主之痰喘甚者加薑汁主之驚病致上竄者為陽實也致下竄者為陰虛也實者攻之虛者溫之兒元真不實動受物驚觸即客忤之謂也中惡者惡邪觸害之謂也即客忤之重也白虎者即輕也兒驚熱不可灸令努氣益盛須用善推法劇者刺之宜鎮肝湯主之鎮肝湯方牲實五分麻黃三分寒水石五分枳實三分芍藥五分甘草三分生薑三分上七味以水一升先煮六味取七合去滓內牲實碾調分溫服發熱驚跳短氣燥煩神魂亂若口渴若嘔吐者宜金雪金雪方金膏石膏芒硝各一錢龍腦二分麝香一分上四味碾調每服一字驚癇眼神翻騰者為天釣諸治驚法須要寬氣托毒也宜釣藤湯主之釣藤湯方釣藤五分野蠶一個芍藥五分辰砂三分犀角三分甘草二分生薑三分上七味以水一升煮取七合去滓分溫服陽癇日二三發引日不解遂轉屬陰癇此為壞病也陰癇不得有汗若有汗者恐亡陽也宜四逆湯驚病昏沉氣鹿喉內如挽鋸者宜麥門加竹瀝湯驚病衄血者可治嘔血者不可治何以謂也曰衄血者邪熱散也嘔血者榮血敗也陰癇即慢驚也若哯乳而大便溏者名曰慢睥風難治天釣者神昏惡𦸉若齧奶熱也內釣者多啼瞌睡必動惕寒也兒臍風若胎驚胸腹石硬反視而不能眴者宜紫霜丸服丸須臾大便通者生不通者死驚熱夜不可停燈若停燈者陽炎卻熱氣益驚跳而藥力必不可鎮也驚病眼睛如魚喘鳴氣急額頭有汗爪之吃吃者死暴卒發熱痰喘肩息啼聲吃吃乳餌不通者名曰纏喉風不可治陽癇口鼻氣冷露睛而微惕有汗者亡陽也宜桂枝附子加黃耆湯驚病必有痰痰者動於熱熱靜則伏於脾若熱盛痰動者發驚癇驚癇四證八侯盡備者不可治身體厥冷反煩渴動躁而神魂亂小便如血者屬牝臟洞竭也昏睡不醒四肢舒撒二便不禁者死二便不通者亦死諸熱發驚反復二三亂髫尚可治嬰孩心不可治發熱發驚短息痰鳴反復而不解女者可治男者難治身冷麵熱倦睡呻吟若尸臭者孤陽飛越也嬰孩為物有熱必虞驚亂髫則少減虞至童丱則更減之然熱盛則不能全無虞也問曰癲癇何狀也答曰暴驚有聲而倒口涎必流須臾還蘇名癲癇也癲癇暴倒狀如死須臾自惺後必苦頭痛若鬱勃如癡者是也宜斷癇丸主之斷癇丸方黃耆五分蛇蛻五寸靈砂三錢細辛五分甘草二分蟬蛻四枚牲實三錢上七味為末棗肉丸如麻子大每服二十丸以人參湯服病人肥白多濕黑瘦多癇屬濕者宜滲濕方屬癇者寧肝湯主之寧肝湯方沉香五分縮砂三分香附五分吳茱萸三分黃連三分上五味以水一升煮取七合去滓分溫服病人重陰者癲重陽者狂如婦女月信適動病益劇獨言妄語者宜了了丸了了丸方黑鉛一兩半水銀二兩硃砂一兩乳香一兩牲實七錢上五味先以黑鉛入銚溶化次下水銀候結成砂子再下二味乘熱用柳木捶研勻內牲實糊丸如芡實大每服二丸以井水送下病人若睡勿驚動自覺即安再服二丸癇病沉痼必變癡名曰癡癇若口訥而不能語者名曰癇啞廢人也辨瘡疹脈症並治第四瘡疹為病熱毒所致惡寒發熱食飲反如故此為瘡疹之漸也寒熱發作口渴脈滑身體有熱處者發瘡瘍也惡寒發熱脈滑而肌膚髮紅班者名曰丹毒也灑淅惡寒肌肉發紅脈者名曰紅絲疔也紅絲疔者為浸蔓法急砭以取毒血也狼牙湯主之兒丹毒為云片若癬疥若毒熱喉腫兼殺腹內一切蟲宜狼芽湯主之狼牙湯方狼牙草五分防風五分惡實一錢甘草三分生薑三分上五味以水一升煮取七合去滓內茉莉白三分調均分溫服兒身體血燥白癍作痂者名曰白遊風宜托裡湯托裡湯方當歸五分黃耆三分紅花三分野蠶一個惡實五分甘草三分大棗二枚上七味㕮咀以水一升煮取七合去滓分溫服兒始生鼻口若穀道蝕爛此為遺毒發動也托毒湯主之托毒湯方小連翹一錢龜板浸醋灸碎一錢紅曲炒五分上三味以水二升煮取一升去滓分溫服若蝕爛劇者加人中白三分攪調分溫服兒遺毒發動蝕爛惡臭諸方無效者宜一字灰主之一字灰方蝦蟆燒灰一錢礬石燒二分石灰水飛二分龍腦二分麝香一分上五味研調摻瘡上日二三次或以雞子清調和敷之兒胎毒若遺毒蝕潰浸淫者宜奇良膏主之奇良膏方奇良一兩八錢龜板一兩雞子殼五錢上三味研羅以膠飴調均每服彈丸大兒惡瘡痛癢若瘻膿滴瀝不竭若大人微毒骨痛遠年近日腐爛臭敗或咽喉唇鼻破壞諸藥無驗者紫寶丹主之紫寶丹方龜板醋煅二兩石決明煅紅浸童尿天靈黑炒銀爐粕各六錢上四味搗篩醋糊丸每服小兒五分大人一錢骨節疼痛者溫酒服腐爛惡臭者奇良湯服傷寒陽毒紅潤稀疏者五六日自瘥若紫黑稠蜜致大熱者不可治陽毒身冷反大渴者難治身熱煩渴者宜化癍加犀角湯主之陽毒如錦文狀此為熱極令然也宜火濟湯主之陰毒發胸背若四肢如蚊咬狀者宜大建中湯黃耆建中湯亦主之兒四肢若背腹癍疹出沒者名曰風疹宜圭麻各半加荊芥防風湯主之風疹者即時毒也癢劇抓則發疹為泄風宜敷薑汁而解也風疹煩癢抓益劇兼主陰毒諸疹尉方白礬四錢食鹽二兩樟腦三錢上三味以水五升煮減二合以屢尉也兒惡寒發熱熱解反發疹如痘泡名曰天泡疹宜消毒飲主之兒天行熱癍簇簇口燥而渴脈數鼾睡者化班湯主之兒夏月疹如粟狀者名曰痱瘡宜苦參湯浴之苦參湯方苦參一斤韶腦二兩上㕮咀以水一斛煮熟浴之日二三次兒身體濕爛浸淫痛癢者名曰浸淫瘡宜防風排毒飲防風排毒飲方防風一錢野蠶一個蝮蛇炒研三分生薑三分大棗三枚甘草三分上六味以水二升煮五味取一升去滓內蝮蛇攪調分溫服病人本有瘡卒瘥者為惡候若本無瘡反發者為佳兆也疹髮指岐煩癢漸延遍身名曰癬疥宜防風解毒湯防風解毒湯方防風五分荊芥三分惡實五分小連翹五分大黃三分火炭母五分甘草三分上八味以水二鍾煮取一鍾去滓分溫服疥疹必痛癢若膿瀝觸則傳染者是也烏頭煎洗之烏頭煎方川烏頭四錢上一味以水三升煎取二升以洗日二三次瘡疹忽燥腹脹息迫煩而不安是以毒內伏故也麻黃野蠶湯主之麻黃野蠶湯方麻黃三分野蠶一個杏仁七枚桑白皮二分沉香二分丁香二分紅豆黑炒一錢木香二分乳香二分生薑二分甘草二分大棗三枚上十二味以潦水二升先煮麻黃再沸去上沫內諸藥煮取一升分溫三服疥疹感觸煩癢爬反痛唯癢者宜莽草湯洗之莽草湯方莽草一斤韶腦一兩食鹽半斤上三味以水一斗二升煮取六升去滓溫洗日二三次以瘡瘥為度兒夏月面厖腫微熱瘡如砂此為漆氣感觸也漆瘡熱痛煩癢者宜無患子皮煎無患子皮煎方無患子十個去實上一味以水二升煎減半升去滓用管吹之當泡起仍追取敷患處漆瘡煩癢難瘥者宜鐵漿灌之礬石湯亦主之礬石湯方礬石一斤上一味以醋一斛水二斛煮熟浴之瘡毒骨痛若腳氣衝心俱浴之兒㿍疹起伏若微熱若吐乳此為交奶所致也頭瘡醫欲急攻之是誤也若被攻者其瘡忽燥痰鳴息商必腹滿四肢厥宜麻黃野蠶湯主之更將𧃲片浸溫酒以尉頭上瘡潤者生否者死頭瘡白班痂㿔若癢若不癢名曰白禿瘡狼牙湯主之兒白禿瘡難瘥者宜松子灰散松子灰散方松子灰四錢韶腦四錢上二味研篩以雞子白敷患處頭髮臭癢劇爬則作片而落名曰白屑風宜白屑散主之白屑散方白附子三兩土硫黃二兩礬石二兩側柏葉一兩五錢百藥煎八兩甘松香四錢三奈三兩龍腦一錢上八味研篩分發擦之以瘥為度鼻發紅班若痛癢者名曰肺風薄荷煎主之薄荷煎方薄荷一兩防風一兩石膏一兩研枳椇子一兩搗如泥白糖三兩上五味以水一斗先煎薄荷防風減四升去滓內三味再煎如膏每服彈丸大兒胎感酒毒鼻紅若紫而瘡名齄鼻宜枳椇子膏主之枳椇子膏方枳椇子二兩去核石膏一兩燒蜂蜜八錢上三味內臼中搗為膏每服彈丸大以白湯服之鼻內瘜肉此為鼻痔宜砭惡血去其重勢也九竅蝕瘡隨月盈虛起伏者名曰月蝕瘡宜五香連翹湯主之五香連翹湯方麻黃三分射干三分枳實五分大黃三分連翹三分雞舌香二分沉香三分木香二分薰陸香二分麝香一分上十味以水二升煮九味取一升去滓內麝香攪調分溫服鼻蝕瘡熱燥意欲濕者名曰鼻䘌即鼻疳也熊膽膏敷之熊膽膏方熊膽一錢燕脂二分蜂蜜五分上三味調和以重湯微溫敷日五六次病人結核如梅實狀名曰瘰癧如馬刀蛤名曰馬刀瘡發頸若胸脅即氣腫也夏枯草膏主之夏枯草膏方夏枯草一斤上一味以酒二斗煮取一斗去滓內膠飴八兩以文火再煮攪調每服彈丸大瘰癧馬刀無膿者是也灸瘡頭若肩髃肘髎俱主之瘡頭隔蒜而灸之也兒體腫結有膿者為胎毒無膿者痰核也結核家須食海菜常食則經久當自愈也發熱惡寒頭面暴腫其脈緊數者宜葛根加荊防湯葛根加荊防湯方葛根五分芍藥五分甘草二分桂枝二分荊芥三分防風三分生薑二分大棗二枚上八味以水二升煮取一升去滓分溫服頸項強痛難顧薲者法以纊厚纏其頸服葛根湯以酣睡濈濈汗出而瘥頭面腫起焮熱煩痛脈洪數此為風毒所致名曰頭瘟宜消毒飲主之面傍厖腫熱痛者為蝦蟆瘟也頭瘟耳鳴如海響名曰雷頭風若從頤頷硬腫食飲難通者名曰鸕鷀瘟難治也問曰有喉痹有乳蛾有纏喉有走馬喉其狀如何答曰乳蛾者以形之謂也纏喉者以病劇之名也走馬者以病急之謂也喉痹者為總名此皆為陰陽鬱塞所致宜桔梗湯主之桔梗湯方桔梗一錢甘草三分上二味以水一升煮取七合去滓分溫服兒喉腫若帝鍾風宜射干麻黃湯主之射干麻黃湯方射干一錢麻黃五分狼牙五分牛房子五分甘草二分上五味以水一升煮取七合去滓分溫服喉嚨即懸癰也腫者帝鍾風也喉風者刺而愈帝鍾風不可刺也兒喉塞發熱肩息痰響啼聲吃吃者名曰纏喉風兒暴卒喉腫發熱反張欲死者名曰走馬喉也諸喉風腫痛食飲不能者宜急刺取血也風毒嗌窒若胃熱熏灼上焦怫鬱口爛食斷也春霞丹主之春霞丹方寒水石五錢蓬砂一錢辰砂一錢馬牙硝一錢龍腦五分冰糖七錢上六味碾調含服喉風者多痰發熱脈數食飲不能者含蓄膏主之含蓄膏方雀屎二十個梅肉一個白糖一匙上三味以薑汁碾調入𧃲袋含服舌瘡若喉腫咽嗌不利者宜火濟加薄荷湯主之乳蛾喉腫者烏頭一塊研如泥醋面調以貼足心再三換之舌腫喉瘡柑檻膏主之柑檻膏方柑檻肉三個白糖四錢上二味研調含服疳熱脈微血燥咽蝕者宜翹花煎病人體羸血涸假火漸熏灼遂為喉癬食飲廢絶者死纏喉若走馬喉大熱脈急反眼肩息者死無熱大便瀉者亦死問曰指瘡有代指有甲疽有瘭疽其狀如何答曰指頭焮熱腫痛爪甲脫落者名曰代指瘡爪甲發瘡煩痛若有熱若無熱名曰甲疽瘡色紫黑而蝕脫者即瘭疽也宜雞子清浸之雞子殼鑿作口以浸指須臾當痛定也指瘡焮熱煩痛者宜蚯蚓油敷之蚯蚓油方蚯蚓三條去泥上一味研為泥以萆麻油漬之指頭髮瘡黑硬者瘭祖也宜附子膏主之附子膏方附子一錢韶腦五分飴糖一錢上三味研調以敷當引出毒氣也掌內濕癬休作不解者名曰鵝掌瘡宜熏之熏方鼠屎二錢川芎四錢大黃四錢上三味燒煙以熏之日二三次禁烟撲鼻也指頭觸寒毒血頑凝不知痛癢者名曰凍瘡宜附子煎洗之附子煎方附子一塊韶腦五分上二味以酒二升煎取一升溫洗日二三次以瘡愈為度胎癬毒腫若癰瘡俱宜清冷膏解之清冷膏方木芙蓉花葉同一兩不拘生干紅豆半兩上二味以蜂蜜研調以敷且干且敷始發者熱散痛歇膿成者膿當自出也身體發瘡若大若小若多若少無定者此為血花名曰血風瘡宜防風敗毒湯服之體膚班瘡若圓若斜爬必有白屑名曰白癬也白癬若紫癬漸長煩癢者磨好墨敷之夏月蒸熱汗氣凝結發班如錢狀名癧瘍即汗班也癧痬得秋涼而解若不解者米秕燒取油敷之問曰癜風如何答曰無瘡而有色者癜風也癜風有白有黑黑者易治白者難治宜蜜陀膏敷之蜜陀膏方金蜜陀四錢天南星四錢附子四錢上三味碾篩用茄蒂醋釀點藥末以磨患處二三次有驗面顏發黑點此為瘀濁所致名曰黑痣療黑痣方糯米百粒石灰拇指大巴豆三個上三味碾調納瓷瓶窨三日先以針撥靨子仍點膏當蝕落也身體發瘡狀如椒子名曰蟲吅一口𧘇瘡宜灸瘡頭自然脫落面顏有滓者此為嗣面婦人則粉氣所致也問曰有贅有癭其狀如何答曰癭者如櫻桃是也瘤者留結之謂也贅者贅出者是也贅瘡宜以蜘絲纏其腳經久而當落也贅瘡若胬肉宜白梅肉敷之白梅肉去核不拘多少上一味研如泥以敷自然消盡也癭瘤若大若少無痛癢者是也問曰五癭六瘤如何也答曰石肉筋血氣此為五癭也骨肉膿血石脂此為六瘤也俱不可剪割唯脂瘤當割破而去脂也五般癭瘤俱蠟礬丸主之蠟礬丸方黃蠟二兩白礬四兩上二味搗調丸桐子大每以溫酒服三十丸日三次內疽腸癰俱治之膁瘡餘瀝不斷煩癢者宜洗之熏之海桐皮石榴皮各等分以水煎去滓灌洗更燒房子熏之黑癬癮疹若瘻瘡膿瀝不竭者七寶丹主之七寶丹方福良八錢漬醋煅數次九孔螺七錢以麵裹煨去粗皮銀丹一錢研末鉛丹五錢五分大黃七錢五分甘草三分五釐白糖四錢上七味研篩以蜂蜜若砂糖湯服日二三次遺毒若黴瘡膚肉欲蝕盡宜麝香油敷之麝香油方麝香一分蟾蜍一分人油一蜆殼上三味碾調敷之日二三次問曰五痔何也答曰牝痔牡痔腸痔血痔脈痔是也腸風臟毒者大便血即瘀濁腸澼也若毒凝塞者名曰痔瘡也痔血鮮紅者為腸風濁瘀者為臟毒宜紅藍酒去瘀血生新血紅藍酒方藍花一兩五錢胡椒四錢白糖一斤上三味以燒酒一斤釀一七日絞去滓分溫服臟熱凝結腸頭作塊名曰痔宜逐毒飲逐毒飲方小連翹一錢惡實一錢雞子殼炙碎五分上三味以水一升煮取七合去滓分溫服九竅腫突者俱為痔也宜刺取血若作口而膿瀝名曰瘻瘡宜七寶丹主之痔為毒腸澼是也劇者大便血即腸風臟毒也風毒客於腸間者為腸風也熱毒客於臟內者為臟毒也腸風者宜驅風熱也臟毒者宜逐瘀血也問曰血有遠近者何也答曰鮮明者必近血也濁瘀者必遠血也近血者易治遠血者難治痔沉痼者漏也用熏方熏方五倍子四錢韶腦四錢艾葉一兩八錢上三味為粗漠充釭內點火跨坐以煙盡為度痔漏蝕爛煩痛者宜木鱉湯主之木鱉湯方木鱉仁五個上一味搗如泥內熱湯熏且洗更木鱉粉調雞子清以敷其痛當自解也痔瘡遣毒諸漏瘡萬方無驗者宜七寶丹兼食龜卵其應如浮鼓也兒兩腸衰弱魄門翻脫者名曰腸痔也良薑飲主之良薑飲方良薑三分蓮蕊三分龍骨三分粳米一錢甘草三分上五味以水二升煮四味取一升去滓內龍骨攪調分溫服兒泄痢廣腸脫出者宜猿膽敷之猿膽一錢韶腦三分上二味以雞子清碾調敷痛處病人腸氣虛極廣腸翻脫者宜蜘蛛散主之蜘蛛散方蜘蛛不拘多少黑炒上一味以蜂蜜研調敷之問曰傷損如何答曰大便必難劇者瘀血沖胸若妄語此為驚氣入心宜桃核承氣湯主之傷損家小便必如血大黃黃連瀉心湯主之打撲血出者為血散若血不出者此為伏血宜蘿蔔汁敷之蘿蔔生一個上以醋研調塗痛處日四五次傷損血出過多目眩悸動者此為氣血虛耗所致宜涼肝湯主之諸瘀血衝心煩躁欲死者還元湯主之還元湯方金水五合苦酒二合上二味調和煮三兩沸加薑汁攪調頻服諸瘀血家宜膠飴酒主之膠飴酒方膠飴半斤梅肉二兩研清酒一升上三味煮調分溫服傷損焮熱煩痛若瘡疹熱腫者桐葉醋敷之桐葉醋方桐葉一兩苦酒三合上二味研調敷患處日數次瘀血凝結作魂而痛者芥子醋敷之芥子醋方白芥子三兩生薑一兩上二味以醋研調敷患處閃肭失足瘀血凝結而煩痛者宜橘核散主之橘核散方橘核炒三兩延胡索一兩桃仁炒一兩上三味研篩每二錢以溫酒服之瘀血衝心驚悸煩躁欲死者宜鐵漿主之鐵漿方鐵砂三兩上一味以童尿一斗攪調入罐內密蓋冬月埋地三尺至春出之分溫加苦酒薑汁服之問曰湯火傷瘡如何答曰火傷忍痛反灸則痛自解若灌水者痛不可解也湯火瘡煩痛者雞子油主之雞子油方雞子黃七個熬取油雲母一錢上二味研調敷痛處湯火傷瘡熱腫煩痛者宜蘿蔔汁若痛不解者生梨汁亦敷之湯火傷皮脫肉蝕者宜黃明膠膏主之黃明膠膏方黃明膠二兩清酒五合上二味以文武火煮為膏敷患處問曰風犬傷如何答曰春夏之交犬多發狂被咬傷者熱腫疼痛劇者作讝言妄語此為毒入心所致也犬狗傷者急砭去血仍灌入溺再塗人屎更掩以紙灸之百壯紙焦屎燥則再三易之連日如斯灸至四五百壯為度犬咬瘡用杏仁粥禁酒若服酒者毒入心驚躁不可治杏仁粥方杏仁一合陳米一合上二味調和煮熟食之問曰蛇咬傷如何答曰誤被咬傷者急灌自已熱溺仍敷以馬錢散馬錢散方馬錢一錢上一味研篩調唾以敷更服醋二合令毒無妄走也問曰鼠咬瘡如何答曰毒鼠咬人熱腫疼痛若劇者致鼠鳴宜貓毛灰敷之貓毛灰方貓毛燒灰三錢麝香一分上二味研調以唾敷之鼠傷瘡者宜綿實熏主之綿實熏方綿實一斤上一味燒煙以熏瘡將息二三次鼠傷若犬毒衝心而煩躁者宜鑯漿兼防風解毒湯服之諸蟲傷煩癢者宜胡椒粉敷之胡椒研篩一分上一味以唾沫調和敷痛處河豚為毒膚肉潤動者毒在腑也胸腹㽲痛者毒在臟也毒在腑者宜韶腦酒毒在臟者宜承氣湯韶腦酒方韶腦五分上一味以酒二升煮減二三合分溫頻頻服魚毒食傷胸腹絞痛二脈沉弦者宜縮砂飲主之縮砂飲方縮砂一錢山楂子一錢厚朴五分枳實三分青皮三分白朮三分生薑三分甘草二分上八味以水二升煮取一升去滓分溫服病人誤服熱方煩熱動躁者此為藥煩也宜黑豆湯黑豆湯方黑豆一錢茉莉白三分大黃二分生薑二分甘草二分上五味以水二升煮取一升去滓分溫服病人誤服烏附目眩欲死者宜地漿主之地漿方黃土二錢上一味以水二升攪調令清澄碩取冷服多食膠飴亦佳人誤服輕粉口顏喎僻手腳拳攣不能伸舒此為毒入骨髓也石榴皮湯主之石榴皮湯方石榴皮二錢甘草五分石決明醋煅去鹿皮研篩一錢上三味以水二升先煮二味取一升去滓內石決明攪調分溫服砒霜為毒煩悶吐血劇者一身紫色而煩熱急取黑鉛四兩磨水一升灌服兼刺雞鴨熱血服之又人糞汁灌之又巴豆去殼一個為末砂糖大一塊水化調一升服之辨疳病脈證並治第五問曰疳有五疳者何謂也答曰五疳者五臟所發見也疳者屬脾脾實則無五疳有五疳者此為脾既病也疳之為恙肉脫血燥腹硬而脈細數若身熱發作若大便溏小便必如米泔也疳有陽有陰蒸熱便難者陽也身腫便瀉者陰也疳有陽有陰始多陽終多陰陽者宜寒涼方陰者宜溫熱方疳病鼻燥欲濕者名曰鼻疳宜熊膽蜜敷之熊膽蜜方熊膽三分芒硝一分蜂蜜一錢上三味研調敷干再三敷之疳病嗜泥好炭此為脾郁所致也兒啼哭聲噎者氣不順也喘痰者氣促迫也聲濁沉靜者疳積也兒身熱發作胸腹痞硬若嘔乳者宜柴胡平胃散料主之疳癖胸脅轆轆有聲若潮熱發作若氣逆妄怒者宜潰堅湯主之兒疳露骨萎黃身熱而溏臭不可近者消疳湯主之消疳湯方茯苓三分白朮炒二分乳柑皮五分莪朮五分三稜五分馬舄五分使君子去殼研二分生薑二分上八味以水一升先煮七味取七合去滓加使君子攪調分溫食遠服病人手背熱者為真火也手心熱者為假火也兒無食腸而與食遂致食癖劇則穀不化血氣漸孤弱者名曰疳癖也病乳癖易化谷癖難化體瘦腹鼓脈沉緊者名曰谷瘕宜潰堅湯潰堅湯方茯苓五分白朮炒三分半夏三分枳實炒三分陳皮五分檳榔五分山楂子炒二分香附子五分縮砂三分綿實黑炒五分風化硝三分莪朮三分三稜五分麥芽黑炒一錢生薑二分甘草一分上十六味㕮咀以水二升煮取一升去滓分溫服病體瘦熱動臉赤鼻燥大便難小便澀者名曰陽疳宜柏皮湯主之兒身熱啼哭腰腹如削者此為缺乳疳也兒無食腸者強與食胸腹硬滿時痛若唇紅唾沫宜𪋞胡湯主之𪋞胡湯方𪋞胡菜一錢檳榔五分大黃五分苦楝皮二分甘草五分上五味以水二升煮取一升分溫二服暮時減食次朝勿食當有驗糜粥自養兒頭脹大漸長反四肢瘦者名曰腦疳宜逐疳丸主之兒體羸腹大眼內生醫者名曰疳眼宜柳肝加馬舄湯主之疳熱鬱釀致蝕瘡者宜烏頭灰以雞子清敷之兒疳骨節疼痛遂致傴僂局背若胸上突起名曰龜胸宜鐵漿服之更龜尿煎敷之龜尿煎方龜尿三合燒酒五合韶腦三分上三味調和煎熟乘熱尉突處疳熱膠凝骨節疼痛胸背欲突起者宜逐疳丸頻服當自愈也疳病脈細數必蒸熱蒸熱者致盜汗遂屬肌膚甲錯也兒疳愛吃泥土者宜伏龍肝丸伏龍肝丸方優龍肝二兩使君肉二兩檳榔一兩南星薑製一兩鰻鱺頭黑炒二兩熊膽一錢上六味研調蜜丸吃炭者去伏龍加炭二兩吃米者加米二兩兒體羸膚燥煩渴者名曰疳渴宜白梅湯主之白梅湯方白梅二個菟絲子一錢上二味以水一升煮取七合去滓分溫服兒疳煩渴不解脈微數小便赤而澀者宜益元散主之益元散方滑石三錢辰砂一錢上二味研調以雪水冷服兒體瘦咬爪大便溏泄連日不解名曰疳瀉宜扶脾湯主之痢疾既解反潮熱血燥者為疳病也痘瘡解後血液必竭四肢瘦削脈細而數此為轉屬疳病也兒病胸骨露腹肚脹大四肢微冷而大便溏者名曰冷疳宜養真湯主之養真湯方茯苓五分白朮三分乳柑皮五分青皮二分半夏五分香附子五分便制縮砂三分酒製藿香二分人參二分破故紙三分附子二分麥芽五分甘草三分生薑二分大棗二枚上十五味以水二升煮取一升去滓分溫服病身熱血燥脈細而數脾氣衰則大便鶩溏胃氣衰則四肢微腫名曰脾癆宜扶脾湯主之病腹肚石硬胃弱不殺穀面顏銀白朝涼暮熱脈細數而肌膚甲錯者名曰疳勞宜抉脾湯主之抉脾湯方茯苓五分白朮二分半夏五分縮砂三分香附子童便制五分蓮蕊三分乳柑皮五分青皮三分食鹽一分人參二分紅曲二分生薑二分上十二味以水二升煮取一升去滓空肚溫服疳勞為病朝涼暮熱咳痰心悸肌肉血燥脈細而數者宜逐疳丸主之逐疳丸方天靈蓋黑炒一兩蝦蟆灰四錢鰻鱺頭燒灰四錢獺肝灸干八錢真珠一錢松脂水飛九錢田螺灰四錢犀角四錢龍腦一錢麝香五分上十味研篩以燒酒糊丸梧子大每服五分雞卵濃湯送下病人骨熱起伏其脈微數四肢肉脫一身血燥名曰乾血勞宜鰻鱺膏鰻鱺膏方鰻鱺去頭骨三斤清酒一斗上二味以文火煮為膏隨意食之疳之為病陽虛則吐血陰虛則小便難陰陽俱虛竭則身體枯燥蒸熱盜汗心悸不安若口渴而咽痛者宜柴鱉湯柴鱉湯方柴胡一錢黃芩三分鱉甲丸二錢茯苓二錢枳實五分寒水石二錢鹿角菜三分蓮蕊二分甘草一分上九味以水二升煮取一升去滓分溫服疳熱骨蒸肌肉銷鑠者宜梔子飯梔子飯方梔子四錢上一味以水一斗煮取汁以炊米作粥食病人氣血虛竭鬱熱起伏二脈細數大便若燥若溏胸痞悸動詬其氣而熱愈動滋其血而胸益痞宜八珍湯主之八珍湯方人參三分茯苓二錢枸杞三錢縮砂五分鹿角霜七分蓮蕊三分生薑一片甘草三分上八味以水二升煮取一升去滓分溫服陰痿遺精腰腳痠痛胸間悸動臍下脫力詬真元滋腎液七珍膏主之七珍膏方人參四錢破故微炒二錢枸杞二十錢雀肉研如泥十錢雞子黃塗板面烈日曬乾十錢白糖二十錢蜂蜜一合上七味以燒酒二升文火煮膠凝為度每服彈丸大鹽湯送下氣血耗散脾胃虛弱遂變見諸症勿論其證勿拘其脈宜連服陰陽調勻湯以取窮境之效也陰陽調勻湯方人參三分茯苓二錢白朮五分橘皮炒五分半夏一錢香附子便制一錢縮砂五分破故五分枸杞一錢黃柏酒製三分甘草三分生薑一片上十二味以水二升煮取一升去滓分溫服疳勞身微腫四肢沉重若大便泄痢者宜真武加馬舄湯若有陰熱者更加鱉甲三分病人肌膚乾枯咳喘少氣名曰疳咳棐子去殼微灸蘸蜜每食一二枚日二三次病胸脅攣拘夜臥盜汗若身發虛班若心悸動者黃耆建中湯主之疳病腹癖膨脹雷鳴而微痛若四肢微腫者大麥煎主之大麥煎方紅豆出芽五分茯苓一錢乳柑皮五分枳實三分大腹皮五分大麥芽二錢生薑二分上七味以水二升煮麥芽減七合去滓內六味再煮取七合去滓分溫服疳腫腹脹小便不通者宜瞿麥湯主之瞿麥湯方瞿麥五分商陸五分茯苓一錢琥珀二分大腹皮三分生薑二分甘草三分上七味以水二升煮取一升去滓分溫服疳病面黃頸細腹大青筋大便溏而澄清者宜七成湯主之七成湯方破故紙一錢附子三分蓮蕊二分茯苓一錢人參二分生薑二分甘草二分上七味以水一升煮取七合去滓分溫服疳病玄府衰則自汗出牝臟衰則大便溏宜溫臟丸主之溫臟丸方蝮蛇灸四錢縮砂二錢破故炒二錢蓮蕊炒一錢熊膽五分甘草三分上六味研篩以燒酒糊丸每服三十丸疳熱發渴要視口內若齒焦黑者名曰走馬疳宜大黃黃連瀉心加茉莉白湯主之疳熱骨蒸咳喘煩悸渴而小便赤者五蒸湯主之五蒸湯方石膏五分知母三分黃柏二分龜板五分地黃三分生用人參二分甘草二分生薑二分大棗二枚上九味㕮咀以水二升煮取一升去滓加童便分溫服疳熱骨蒸咳痰吐食其腹郁膨若微痛吞酸腥臭者宜鱉甲枸杞飲鱉甲枸杞飲方鱉甲一錢枸杞一錢犀角三分上三味以水一升煮取七合去滓分溫服病骨熱咳痰身微腫吐鮮血者宜犀角山漆湯犀角山漆湯方犀角五分山漆二錢人中白三分上三味先煮二味去滓內人中白攪調分溫服若痰多者更加竹瀝三分亡血家飲食減少肌色脫是趹必致腫也疳病脈細而沉腹滿腸鳴必作䭇也趹陽脈浮而數浮則為虛數則為熱虛熱相搏故令氣䭇言胃氣虛竭也百骸乏力咳痰倚息身浮腫大便泄利者不可治疳病腹滿如鼓為丁奚若吐乳食為哺露俱屬難治病人倦臥而不食其眼失神顴時紅者孤陽之動也疳病倦臥唇色脫盜汗不歇者死病奐口倚息鼻焦唇燥蛔既出者死病暴熱倚息飲食不能者可治漸熱休作行動煩悸飲食少進者不可治陰虛者陽必動之熱也陽虛者陰必𦑜之腫也陰陽偏廢者不可治辨上焦病脈證並治第六問曰上焦病何謂也答曰假令如鼻耳眼口所患此為上焦之病也頭痛發熱咳嗽鼻鼽脈浮而數者風寒也頭痛休作肌膚鮮明而脈滑者為留飲也頭痛胸痞若腳攣脈細而弦者宜柴胡蒿本湯主之柴胡蒿本湯方銀柴胡五分黃芩二分半夏五分人參二分蒿本五分川芎二分桂枝三分大棗二枚生薑二分甘草二分上十味㕮咀以水二升煮取一升去滓分溫服頭痛氣逆若頭眩脈微滑者桂枝茯苓白朮甘草湯主之桂枝茯苓白朮甘草湯方茯苓五分桂枝三分白朮五分甘草三分上四味以水一升煮取七合去滓分溫服頭痛發作脈數實此為頭瘡之兆也宜芎黃加味丸芎黃加味丸方天靈蓋大黃各二兩川芎一兩上三味研篩以酒糊丸頭痛脈細胸中溫溫唾白涎者宜吳茱萸湯頭痛胸痞若悸動脈關上浮者大黃黃連瀉心湯主之頭痛眼黃大便硬者宜大承氣湯主之頭腦刺痛四肢厥冷額汗出此為痛人泥丸宮即真頭痛也朝發者夕死夕發者朝死兒疳熱熏灼遂客於頭腦其囟尖高者名曰囟填也兒瀉泄不禁真元降陷囟致坖者名曰囟陷宜抉脾加殭蠶湯主之問曰眼病何以所致答曰疳熱風毒若胎毒是皆眼疾之所因也眼目暴腫焮熱而疼痛者風熱所致也眼翳朧朧然胸腹如娠脈沉細者疳熱所動也眼目熱紅膚作班者為胎毒宜火濟湯主之眼瞼蝕爛身涼和脈沉細者為遺毒也芎黃加味丸主之眼疾熱痛不解者宜鐵落漿點之鐵落漿方鐵落四錢以雪水五合浸之一七日色如皂角汁燕脂寒制二分上二味調和以點日四五次眼病脈數緊目脈血腫而痛此為風眼若不痛名曰疫眼也菊花湯主之菊花湯方菊花五分防風一錢川芎三分梔子黑炒三分甘草二分上五味以水二升煮取一升分溫服眼瞼發瘡脾郁所致名曰眼疣減飲食而自愈朝明暮暗名曰雀目此為疳郁所致也宜夜明砂丸主之夜明砂丸方夜明砂三錢炒研熊膽五分上二味研調糊丸麻子大每服三十丸血眼熱痛若疫眼紅腫俱點還元水兼與三黃加細辛馬舄湯主之疳火鬱蒸遂害精萃翳如霧裡此為疳眼也兒省目若疳眼者鰻鱺膽若海鯽膽皆食之當自愈兒眼瞼浮腫休作者食飲過飽所致也痘眼致星障若翳膜者須要急治點以雞冠血點燕卵清亦佳痘毒若風毒致翳障者宜辰砂膏主之辰砂膏方萆麻子一兩茬油三合辰砂四錢上三味搗爛作膏貼百會又敷諸瘡而愈若産婦胞衣不降者貼足心傷損眼焮熱煩痛者宜蘘荷根點之點方蘘荷根一個去粗皮上一味研絞取液以屢點痛當自解也塵砂侵眼磣痛多淚者好墨磨清水以點入闔眼少頃以紙捻從眥尾向眥頭拭淨二三次塵當出也眼目焮熱煩痛者為陽眼也無熱而碧白不辨物者陰眼也陰眼者難治陽眼焮痛瞳仁破者亦難治風眼熱腫疼痛瞳仁翻突者不可治問曰鼻病如何答曰鼻焮熱而燥屢欲濕之濕則蝕爛而痛者為鼻疳也鼻熱紅若腫大脈洪而數者為肺風也鼻濁瀝流如泉名曰鼻淵即腦漏也頭為風熱客於肺所致必致瞑目劇者致衄蔑宜三黃瀉心加細辛薄荷湯鼻內瘜肉即鼻痔也若焮熱紅腫鼻甕凝塞名曰鼻齆宜割破取瘀濁也肺風腫痛諸鼻瘡其脈洪數者宜火濟湯服之鼻瘡齄鼻酒毒入肺所致者葛花湯主之葛花湯方葛花五分枳椇五分薄荷三分石膏一錢甘草二分上五味以水一升煮取七合去滓分溫服兒鼻熱燥遂窒塞鼻息高鼾睡眠不安名齁䶎宜蜂蜜點之病人肺竅為風熱所闔遂齁䶎難以息者宜瓜蒂散用管吹之燥煩而解也鼻瘡腫大其脈洪而滑者為鼻齆也通肺飲主之通肺飲方蒼耳子五分辛䓴仁五分白芷三分細辛二分薄荷二分龍腦一分生薑二分上七味以水一升煮六味去滓內龍腦二三沸分溫服日三服鼻不聞香臭此為肺竅郁遏所致宜通肺飲主之問曰有衄血有吐血其別如何答曰鼻者與肺通血溢於腦者致衄血也血動於胸者致吐血也病人血氣暴動致衄血其脈數實者宜大黃黃連瀉心湯主之衄血為恙惡寒發熱其脈浮而緊者此為風熱欲解所致也鼻衄若吐紅喘痰盜汗脈虛微者宜玄參湯玄參湯方玄參三分地黃生三分梔子炒三分犀角三分上四味以水一升煮取七合去滓分溫服驚觸逆動而暴衄者先以冷水噀其面仍與大黃黃連瀉心湯鼻衄吐紅暴流元陽欲脫者宜灸湧泉大敦尉百會亦為佳病人身體羸瘦其脈細數咳血若衄血者此為上實下虛之侯也宜燒酒加蘿蔔汁服之又紫糖以燒酒和解服之使大蒜研如泥貼足心病人衄蔑顏紅此為孤陽奔騰好墨磨熱湯加人尿服之又花蕊石散主之花蕊石散方花蕊石四錢食鹽一錢上二味研均以童尿服咯血若大便血諸虛動所致者宜攝血陽主之攝血湯方當歸五分芍藥五分地黃生三分川芎二分蝮蛇炒研三分生薑二分上六味以水二升先煮五味取一升去滓內蝮蛇攪調分溫服血動為病陽盛則身熱陰盛則身冷身冷者易治身熱者難治病人九竅失血身熱不解脈滑數者不可治傷寒熱客於膀胱遂致血泄此為病解也病人吐紅腥臭不可近其脈洪大若頭眩者為難治血動為侯其人肌膚黑瘦者易治白肥者難治問曰耳疾如何答曰耳之為恙脈浮者為實沉者為虛實者發瘡虛者致聾兒耳膿瀝而敗臭此為脾郁所致以食飲過飽故也名曰聤耳宜大黃黃連瀉心湯風熱上攻而鼓擊耳鳴恰如海濤者宜防風攻毒飲主之防風攻毒飲方防風五分細辛二分牛房子五分黃柏炒三分寒水石一錢芒硝三分甘草二分上七味以水二升煮取一升去滓分溫服病人耳鳴恰如蟬聲暮則劇朝則減此為無根假火奔騰所致也烏鴉黑散主之烏鴉黑散方烏鴉黑炒四錢黃柏黑炒二錢梔子黑炒三錢上三味研調以白湯加童便服之耳痛休作若膿滴若蟬聲者宜白礬油主之白礬油方白礬五分麝香一分上二味先以清油二升煮白礬內麝香攪調滴入日二三次耳鳴休作久久致聾者不可治風毒逆鼓而耳鳴如聾者尚可治假火奔騰為勞聾者不可治問曰齒齦腫痛何謂也答曰齒齶熱腫而痛脈必浮數者為風熱所致若脈沉數其齒焦者為齵齒也齦齶暴腫而痛此為風毒所致宜消毒飲主之齒齦煩熱疼痛若風熱若脾熱所致者宜木鱉散主之木鱉散方木鱉子一錢龍腦二分上二味研篩醋調敷患處齒暴燔灼乾黑而脫落者為走馬疳也蘿勒散主之蘿勒散方蘿勒三分蝦蟆燒作灰二分龍腦二分上三味研調敷患處重齶焮熱而煩痛者宜砭瘀血也齒痛體作者灸列缺若陽溪不復發也問曰口涎流出者何謂也答曰涎者脾液也口流涎者此為脾失收攝所致也養臟湯主之養臟湯方茯苓五錢白朮炒三分陳皮五分半夏四分人參二分柯子二分生薑二分大棗三枚縮砂三分甘草三分上十味以水二升煮取一升去滓分溫服問曰暴啞者何以所致也答曰病人暴啞其聲啾啾脈沉伏而咳此為風痰凝結也若聲吃吃脈動數狀如狂者驚觸若蟲癖也病人失聲如囁狀此為風痰凝塞所致也白糖飲主之白糖飲方白糖四錢蘿蔔汁五分姜三勺上三味調和頻頻服病人由驚觸而啞者宜蜜陀丸蜜陀丸方金蜜陀四錢麝香一分辰砂三分豬膽二分上四味研篩薑汁糊丸桐子大每服三十丸以溫膽湯服之兒情態恰如癡而訥語此為癇啞也病人體倦乏氣力其聲如隔壁而語此為病末以血液竭故也病人身熱脈數而嘔者為胃熱所致也若身冷脈沉者胃寒令然也病候有聲而無物名曰嘔無聲而有物此為吐若脈滑為痰飲脈弦為蟲動蟲動所致宜安蛔湯安蛔湯方人參二分白朮三分茯苓五分乾薑三分烏梅一個蜀椒二分上六味以水一升煮減三合去滓分溫服病人諸嘔吐水穀難入者宜半夏茯苓湯主之半夏茯苓湯方半夏五分茯苓五分生薑三分上三味以水一升煮取七合去滓分溫服嘔逆微熱胸脅苦滿其脈細弦者宜柴胡湯主之病人胸間漉漉作聲吐出水穀者茯苓飲主之茯苓飲方茯苓五分人參三分白朮三分枳實二分橘皮三分生薑二分上六味以水一升煮取七合分溫服病發熱而渴飲反嗆者為水逆也五苓散主之嘔吐休作飲食不能者宜燒酒服之服法燒酒五合白糖四錢薑汁一合上三味研調每服一蜆殼日五六次嘔家腹滿潮熱若腹痛唇燥舌乾者此為實宜大承氣湯主之兒暴吐脈腹反如故此為乳餌所妨也嘔家有癰膿者勿治膿儘自愈嘔乳休作連日不解者發驚癇不可治也嘔吐腹大四肢瘦其脈細弦者疳也嘔家要減飲食若妄飲食者不可治也問曰膈噎病何以所致也答曰天質虛弱七情鬱塞若飲食飢飽過度脾力仍孤竭濁痰膠疑致以飲食溢吐也飲食噎出肌膚血燥脈微弱者為極虛也與蜆殼散蜆殼散方蜆殼浸醋燒四錢雞子殼四錢白糖一兩上三味研調以生薑湯服之病人脈滑而動飲食時噎吐者宜大半夏湯大半夏湯方半夏一錢人參三分白蜜五錢上三味以水二升調和煮取一升去滓分溫服膈噎胃反飲食時吐出者宜鸕鷀散鸕鷀散方鸕鷀黑炒上一味研篩每一錢以燒酒溫服膈噎飲食吐出而難內其脈沉弦此為病屬沉痼也宜老涎飲主之老涎飲方老牛涎一升燒酒一升上二味調和兩三沸更加薑汁每服一二合以病愈為度終身當不復發也胃反膈噎諸脾虛食穀不化若留飲胸腹雷鳴俱宜丁香煎主之丁香煎方丁香三十五個大棗二十枚生薑一錢上四味以水五升煎取三升去滓煮陳米一升為粥加食鹽一匙攪調啜食兼服白梅蘿蔔汁等朝食暮吐暮食朝吐四肢瘦腹肉脫者為難治嘔家勿攻以上實下虛所致也飲食噎而難內者尚可治內而難收者不可治問曰噯氣吞酸何謂也答曰噯者出食臭酸者致酸味是以食飪鬱塞也食谷不殺吞酸噯臭劇者膨滿而痛宜平胃散主之病人腹力衰弱胸間留飲若嘔逆食臭者宜茯苓飲服之病人胸痞雷鳴大便泄利若干噫食臭者是以胸腹不和故也生薑瀉心湯主之生薑瀉心湯方生薑三分甘草二分人參三分乾薑三分黃苓三分半夏一錢黃連二分大棗二枚上八味以水一升煮取七合去滓分溫服論曰𩞄雜為恙痰火鬱灼為此害也宜青皮湯和之青皮湯方青皮一錢食鹽燒三分生薑五分上三味以水一升煮取七合去滓分溫服師曰穀氣實則噫虛則噦噦為吃逆吃者噦聲輕也噦者吃聲重也噦者吃吃作聲以草刺鼻嚏而解即是也吃逆休作數月不解食飲喜戲反如故此為蟲氣令然也病人困倦噦吃而脈沉細此為胃虛也宜柿蒂湯主之柿蒂湯方柿蒂一錢半夏五分丁香三分生薑三分上四味以水一升煮取七合去滓分溫服噦吃若熱若寒俱宜蘿蔔飲主之蘿蔔飲方蘿蔔汁五合白糖二兩燒酒二升上三味調和分溫頻頻服噦家體羸血燥脈沉而細此為陰陽失順攝也問曰咳嗽其別如何答曰浮風緊寒數熱細濕虛勞俱為肺氣不利也風寒所襲其人若胸間有水氣若干嘔必脈數而咳宜小青龍湯主之小青龍湯方麻黃五分芍藥五分半夏五分五味子三分乾薑三分桂枝三分細辛三分甘草二分上八味以水一升五合先煮麻黃減五合去上沫內諸藥煮取七合去滓分溫服咳家夜間更劇引日難解者宜斂肺飲兼嗅方主之斂肺飲方射干一錢白芥子一錢生薑三分罌粟殼炒一錢上四味以水二升煮取一升去滓分溫服嗅方木鱉子一兩款冬花一兩上二味作莫每三錢焚煙以鼻吸少頃當涎出仍服生薑湯兒骨露血燥咳喘而乏氣力此為疳咳宜苦酒雞子噉之棐實蜜灸亦佳苦酒雞子方雞子一個上瀹熟去殼以苦酒再煮噉之咳家體瘦血燥其脈細數必致咯血此為虛極也鱉枸湯主之論曰病有喘有哮短氣息迫名曰喘也喉內致響聲名曰哮也宜茯杏甘橘枳薑湯主之茯杏甘橘枳薑湯方茯苓一錢杏仁七個甘草三分橘皮五分枳實三分生薑三分上六味㕮咀以水一升煮取七合去滓分溫服喘家多以暑月寒月必發動此為肺臟久蓄濁氣所致也茶實飲主之茶實飲方茶實炒五分蒂藶五分桑白皮三分乾薑三分大棗二枚甘草二分上六味以水一升煮取七合去滓分溫服喘咳氣逆痰息煩動其脈沉弦者澤漆湯主之澤漆湯方澤漆一錢半夏五分紫參五分白前三分生薑三分上五味以水一升煮取七合去滓分溫服病人動躁汗出而喘無大熱者可與麻黃杏仁甘草石膏湯主之麻黃杏仁甘草石膏湯方麻黃四分杏仁七個甘草二分石膏一錢上四味以水一升先煮麻黃減二合去上沫內諸藥煮取六合去滓分溫服咳喘交作短息而動躁其脈浮大眼如脫狀此為肺脹也越婢加半夏湯主之體瘦肌燥喘哮休作若痰咳咯血夜臥不安者薯蕷膏主之薯蕷膏方薯蕷去上皮一顆白糖一兩上二味搗如泥每服彈丸大日四五次肺脹息迫四肢厥額汗流脈沉結者死問曰熱在上焦者因咳為肺痿肺痿之病何從得之師曰或從汗出或從嘔吐或從消渴小便利數或從便難又被快藥下利重亡津液故得之曰脈數其人咳口中反有濁唾涎沫者何師曰為肺痿之病若口中辟辟燥咳即臍中隱隱痛脈反滑數此為肺癰咳唾膿血脈數虛者為肺痿數實者為肺癰桔梗湯主之桔梗湯方桔梗二錢甘草五分上二味以水二升煮取一升去滓分溫服肺痿吐涎沫而不咳者其人不渴必遺尿小便數所以然者以上虛不能制下故也此為肺中冷必眩多甘草乾薑湯以溫之肺癰喘不得臥蒂藶大棗瀉肺湯主之蒂藶大棗瀉肺湯方蒂藶炒一錢大棗三枚白芥子五分上三味以水一升煮取七合去滓分溫服咳而胸滿振寒脈數時出痰血腥臭此為肺癰之漸也肺癰吐膿血不息一身蒸熱脈細而數自汗若盜汗者不可治問曰骨鯁何以所治答曰魚骨為恙急噉膠飴無驗者再三噉而愈人誤為魚骨所害金鳳實服之金鳳實三個研末以冷水調服更以熱湯嗽之人噉餅誤膠其喉煩悶而欲死者急苦酒白糖攪調服蘿蔔汁頻服亦佳兒誤吞稻筆咽嗌不利而煩亂者急食膠飴無驗者再三食之兒誤吞金銀若銅鐵宜縮砂飲縮砂飲方縮砂一錢生薑五分上二味以燒酒一升煮取七合去滓分溫納白糖攪調服問曰胸痹心痛何謂也答曰胸痛其人脈滑者痰飲所致也腹滿而胸痛脈實緊者谷飪所致也胸脅攣拘其痛休作有時此為蟲動也傷寒脈浮反攻之遂胸痞而痛名曰結胸但滿而不痛此為痞宜半夏瀉心湯半夏瀉心湯方半夏五分黃芩三分乾薑三分人參二分黃連三分大棗三枚甘草二分上七味以水一升煮取七合去滓分溫服胸痞按之濡其脈開上浮者大黃黃連瀉心湯主之大黃黃連瀉心湯方大黃五分黃連五分上二味以麻沸湯一升漬之須臾絞去滓分溫再服胸痞乾噫食臭脅間有水氣腹中雷鳴下利者生薑瀉心湯主之支飲胸滿者厚朴大黃湯主之厚朴大黃湯方厚朴一錢大黃五分枳實三分上三味以水一升煮取七合去滓分溫再服心下痞而復惡寒汗出者附子瀉心湯主之心胸中有停痰宿水自吐出水後心胸間虛氣滿不能食茯苓飲主之大陽病外證未除而數下之遂協熱而利利下不止心下痞硬表裡不解者桂枝人參湯主之胸痞劇則致痛痛劇則徹背遂動躁而脈沉伏宜鬼箭湯鬼箭湯方鬼箭二錢人中白五分芒硝三分甘草二分上四味以水一升煮取七合去滓分溫服大寒痛嘔不能飲食皮粟起宜大建中湯主之大建中湯方蜀椒五分乾薑四分人參三分上三味以水二升煮取一升去滓內膠飴二錢微微火煎取一升分溫再服蛔蟲之為病令人吐涎心痛發作有時毒藥不止甘草粉蜜湯主之甘草粉蜜湯方甘草五分粉三分蜜一錢上三味以水一升先煮甘草取七合去滓內粉蜜攪令和煎如薄粥溫服胸間虛氣滿若疼痛其脈細弦者熊膽飲主之熊膽飲方熊膽三分石決明浸醋燒去火毒五分上二味以燒酒先解熊膽更內石決明攪調分溫服潮熱胸滿而痛不可近者大陷胸湯主之大陷胸湯方大黃五分芒硝五分甘遂五分上三味以水二升先煮大黃取一升去滓內芒硝煮一兩沸內甘遂末溫服得快利止後服支飲家咳煩胸中大痛宜十棗湯主之十棗湯方芫花甘遂大戟大棗上三味等分各別搗為散以水一升半煮大棗肥者十枚取八合去滓內藥末強人服三分羸人服二分溫服之利後糜粥自養胸腹急痛若噫息其脈滑動急與食鹽湯仍以鵝翎探其喉當暴吐而愈胸腹硬滿而大痛其脈滑數急與厚朴三物湯胸腹硬滿卒痛身厥脈伏急與紫霜丸胸腹疼痛脈乍數乍遲當吐蛔也胸痛反覆動轉面顏失色額汗如流身厥脈結名曰真心痛朝發者暮死暮發者朝死辨中焦病脈證並治第七問曰中焦為病侯何謂也答曰乳食飢飽失度遂致腹內萬變病假令如疳癖谷瘕若腫滿脹單即是也兒嗔聲緩急啼號無淚而脈弦急此為腹痛也腹痛在臍上硬滿者必食飪也在臍下石硬者後必致淋也腹痛食飪所致者平胃散主之平胃散方厚朴三兩四錢陳皮四兩蒼朮一兩甘草五錢生薑五錢上五味㕮咀焙搗為末每服一錢以鹽湯攪調服傷寒發汗後腹脹滿者宜厚朴生薑甘草半夏人參湯主之厚朴生薑甘草半夏人參湯方厚朴一錢生薑三分半夏五分人參二分甘草三分上五味以水一升煮取七合去滓分溫服兒腸脆窄過餐生冷腹鬱滿而微痛此為食鬱莪朮丸主之莪朮丸方莪朮三稜陳皮青皮縮砂各五錢乾薑胡椒各二錢上七味搗篩以醋糊為丸每服二三分脅腹攣拘而痛者與建中湯若膨滿而痛者不當與也體膚㿠白四肢乏力腔內時痛雷鳴而溏宜厚朴枳實湯厚朴枳實湯方厚朴五分枳實三分陳皮五分茯苓五分香附子五分檳榔五分黃連三分上七味以水二升煮取一升去滓分溫服腹硬脈弦痛而閉者厚朴三物湯主之厚朴三物湯方厚朴一錢枳實五分大黃五分甘草三分上四味以水一升煮取七合去滓分溫服腹內絞痛四肢厥冷脈沉伏而陰縮者豬膽酒主之豬膽酒方野豬膽二個上一味以燒酒一升煮減二三分分溫頻頻服胸腹雷鳴急痛脈沉弦腰腳如冰冷者宜熏臍法熏臍法碗表鑿二三孔仍以熟艾指大倒著其裡面點火以覆其臍煙當從孔出熏竭再三依前法以腹溫為度盤腸痛屬寒疝但不直視者是也烏頭桂枝湯主之烏頭桂枝湯方烏頭一枚熬上一味以蜜三升煎減一升去滓以桂枝湯一升解之分溫少少服不知者稍加服知者如醉狀得吐者為中病盤腸痛冷氣鬱結而不解者當歸四逆加吳茱萸湯主之當歸四逆加吳茱萸湯方當歸一錢芍藥一錢桂枝三分細辛三分吳茱萸二分生薑三分通草一錢甘草二分大棗二枚上九味以水一升清酒一升煮和取一升去滓分溫三服兒腹肚絞痛有瘛瘲者內釣也無瘛瘲此為盤腸宜當歸附子湯當歸附子湯方當歸牛膝芍藥各二錢桂枝附子甘草各五分上六味以水二升煮取一升去滓分溫服婦女腰腹絞痛面紅者此為血氣所致也宜桃核承氣湯桂枝茯苓丸亦主之桂枝茯苓丸方桂枝茯苓牡丹去心桃仁去皮尖熬芍藥各等分上五味末之煉蜜和丸如彈丸大每日食前服一丸不知加至三丸腹內血氣㽲痛者蟹爪枳實湯主之蟹爪枳實湯方蟹爪浸醋灸一錢枳實一錢芒硝三分芍藥一錢桃仁五分甘草三分上六味以水二升煮取一升去滓分溫服脅下偏痛發熱脈緊弦此寒也以溫藥下之大黃附子湯主之大黃附子湯方大黃五分附子三分細辛三分上三味以水二升煮取一升去滓分溫三服腹中寒氣雷鳴切痛胸脅逆滿嘔吐附子粳米湯主之附子粳米湯方附子三分炮半夏五分甘草三分大棗三枚粳米五分上五味以水一升煮米熟湯成去滓分溫服論曰腹滿按之硬而落落者為癖塊也濡而漉漉者為濕腫也兒脾弱食穀不化遂致食瘕宜潰堅湯主之腹內食谷不消鬱塞而硬滿逐致蟲塊宜鷓鴣菜湯癖塊屬脾弱其治無瀉法宜磨谷化塊方癥結積聚虛冷若中暍霍亂宜木天蓼湯主之木天蓼湯方木天蓼五分枳實三分茯苓五分桂枝三分生薑三分上五味以水一升煮取七合去滓分溫服癥塊鼓滿按之不移四肢細削者潰堅酒服之潰堅酒方狼毒一兩三稜五錢莪朮五錢枳實四錢檳榔四錢縮砂三錢青皮三錢乾薑三錢白糖半斤上九味搗篩以燒酒一斗攪調蜜封四五日分服日二三次病者腹滿時減復如故此為脾虛鼓滿之漸也宜羅勒湯主之羅勒湯方羅勒一錢人參三分枳實三分青皮三分茯苓五分白朮三分厚朴三分生薑三分大棗三枚上九味以水二升煮取一升去滓分溫服消食破滿氣檳榔丸主之檳榔丸方檳榔三錢木香人參各二錢枳實四錢胡椒一錢甘草二錢上六味酒糊丸病人鼓滿漸脹飲食反如故此為腸表瘜肉名曰脹單廢人也胸腹大滿奔豚悸動短息而額汗出者不可治塊瘕漸大四肢腫滿從臍水瀝流者為難治腫從四肢向腹者尚可治也從腹向四肢者不可治也辨下焦病脈證並治第八問曰下焦病何謂也答曰大便難若瀉小便不利若遺溺及痿躄腳痛此為下焦所患也大陽病桂枝證醫反下之利遂不止脈促者表未解也宜葛根黃芩黃連湯主之葛根黃芩黃連湯方葛根五分甘草五分黃芩五分黃連三分上四味以水二升先煮葛根減半升內諸藥煮取一升去滓分溫三服大陽與少陽合病自下利者與黃芩湯若嘔者黃芩加半夏生薑湯主之黃芩湯方黃芩三分甘草三分芍藥一錢大棗三枚上四味以水二升煮取一升去滓分溫服脈浮小便不利微熱消渴大便洞瀉其色黃此為熱瀉宜五苓散主之發熱惡寒吐瀉煩渴若腹痛者清寧湯主之清寧湯方葛根五分人葉三分蒼朮三分茯苓五分木香三分藿香三分甘草二分上七味以水二升煮取七合去滓分溫服發熱汗出不解心下痞硬嘔吐而下利者大柴胡湯主之下利脈遲而滑者實也利未欲止急下之宜大承氣湯下利脈反滑者當有所去下乃愈宜大承氣湯下利已瘥至其年月日時復發者以痛不盡故也當下之宜大承氣湯少陰病四逆其人或咳或悸或小便不利或腹中痛或泄利下重者四逆散主之下利脈沉弦者下重脈大者為未止宜硬飯湯硬飯湯方硬飯二錢半黑炒半生用檳榔一錢芍藥一錢枳實五分茯苓一錢甘草三分大棗五枚生薑三分上八味以水二升煮硬飯減五合內諸藥煮取一升去滓分溫服有熱者加黃連黃苓有寒者加附子乾薑兒大便窘迫狀如膠而面顏皺者為痢也瓊脂湯服之瓊脂湯方瓊脂五分枳實五分芍藥一錢檳榔五分大棗三枚甘草二分生薑三分上七味以水二升煮取一升去滓分溫服大陽病外證未除而數下之遂協熱而利利下不止心下痞硬表裡不解者桂枝人參湯主之桂枝人參湯方桂枝三分甘草二分白朮三分人參二分乾薑三分上五味以水二升先煮四味取一升肉桂更煮三兩沸去滓分溫服下利腸澼腥臭腰髖煩痛宜剪紅丸剪紅丸方蜜香四錢縮砂四錢熊膽一錢阿片一錢龍腦三分麝香一分甘草三分上七味研篩以燒酒糊丸桐子大每服二三丸大便後重而節續煩渴而小便澀若大便去紅者山漆湯服之山漆湯方山漆根二錢山藥酒製炒一錢芍藥二錢枳實五分大棗三枚生薑三分甘草二分上七味以水二升煮取一升去滓分溫服大便窘迫腰腹絞痛而煩取熱湯灌觸器仍登器湯氣熏蒸腰腹自和大便當快通也下利手足微冷脈澀者不可更攻宜詬血散詬血散方當歸四錢蝮蛇三錢黑炒上二味研篩以溫酒服之發熱暴瀉脈浮渴而小便不利者五苓散主之發熱脈數腹中痛屢欲圊便煩渴而小便少此為瘕泄也瘕泄大便如糜法須攻之瘕不竭痢示不罷也痢疾為瘀濁故後重而腸垢必苦裡急假令無腸垢者無後重也若脈滑而疾者當屎膿也腹痛暴瀉惡臭不可近者為食積也兒暴瀉難以陽決之久痢難以陰決之暴瀉以多脫陽也久痢以多瘀熱也小陰病下利便膿血若廣腸脫出宜桃花湯主之桃花湯方赤石脂五分乾薑三分粳米三分上三味以水一升煮米令熟去滓溫服下利如蟹渤勃勃作聲者此為氣痢也氣痢丸主之氣痢丸方訶子皮四錢蜜香二錢人參三分上三味研篩蜜丸桐子大每服二十丸痢疾後重不解其脈虛而動此為便血之兆也小連翹湯主之小連翹湯方小連翹二錢芍藥一錢檳榔二錢木香七分甘草三分上五味以水二升煮取一升去滓分溫服大腸熱則致後重寒則致驚溏若噯息者谷飪也夏月腹痛而泄瀉痛一陳泄一陳此為腸間熱也黃連香薷飲主之發熱煩渴大便如卵黃者熱瀉也無渴而清澄者驚溏也病人為冷食所傷遂脅寒而利如鴨屎此為驚溏也抉脾湯主之下利日數十行血液內竭脾氣空乏煩渴嘔逆飲食不能此為禁口痢也蓮肉飲主之蓮肉飲方蓮肉炒二錢黃連三分食鹽炒二分上三味以水一升煮取七合去滓內蘿蔔汗攪調分服下利陰陽內竭胸腹悸動飲食不能宜熏臍溫之痢疾腰腹絞痛諸方無驗者灸章門京門若腰腹諸穴痢下旬余體瘦血燥四肢微冷反面色緣緣正赤此為孤陽沸郁所致也麥門冬湯服之大便滑泄胸腹雷鳴脈沉弦此為脾冷所致也薯蕷湯主之薯蕷湯方薯蕷一錢茯苓一錢白朮五分人參三分青皮三分半夏一錢縮砂三分香附子浸童便灸五分藿香三分蓮蕊三分甘草三分生薑三分上十一味以水二升煮取一升去滓分溫服脈微而數微為陰虛數為陽動虛動相搏孤陽不能獨立體膚自冷瘦黎明大便溏此為腎冷然也宜七成湯主之小陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者此為有水氣真武湯主之病人陰陽俱厥脾氣孤弱五腋注下下焦不闔清便飧泄若腹築湫而痛者參茯白朮散主之參茯白朮散方人參白朮茯苓山藥縮砂陳皮乾薑蓮肉各三錢藿香白扁豆薏苡甘草各半減上十二味搗篩為散或以膠飴調勻服之痢疾禁妄攻若妄攻者瘀濁未減而血液必竭也痢疾要屢視口內若齒焦者為走馬疳也痢毒疫熱若瘡疹毒宜翹花煎服之翹花煎方翹花五錢白糖五錢上二味以水二升煮翹花去滓內糖服之痢熱不減煩渴而昏睡其脈弦急者此為發驚之漸也溏泄家要減飲食若妄食者為難療痢後血液燥竭腳肉殊脫削若攣急而疼痛此為鶴膝風也痢疾後重而努力必致脫肛以下焦虛故也痢下數旬不解血液干竭而脈細數者轉屬疳瀉也病人脈沉而遲面少赤身有微熱下利清穀者必鬱冒汗出而解其人必微熱所以然者其面戴陽下虛故也面體羸瘠脾胃虛弱飲食減少苦瀉泄者宜白朮膏服之白朮膏方白朮一斤焙茯苓四兩陳皮四兩上三味以水一斗熬取三升濾去渣又以水八升熬取二升將渣搗爛又以水五升熬取一升都合前汁再熬至二升加蜜四兩熬至稠滴水成珠為度每服彈丸大日二三次瀉泄家小便當少今反多是欲愈也痢疾為恙以順氣活血為要其氣順則裡急減其血活則泄利自愈痢下數月休作者為休息痢也病人瀉泄脈浮而遲此為表熱裡寒其便必完穀也四逆湯服之少陰病下利清穀裡寒外熱四肢厥脈微欲絶者通脈四逆湯主之加人參三分前後二便易其位而出名曰交腸此為臟腑錯雜所致也痢下腸澼如魚腦若屋漏目紅唇燥此為氣血敗絶也痢下旬余不解鮮血自利脈微肩息多呼少吸者死下利手足厥冷無脈者灸之不溫若脈不還反微喘者死暴利脈絶手足厥冷晬時脈還手足溫者生脈不還者死痢下體瘦脈虛反能飲食者生不能飲食者死體厥脈微口渴下利清穀短氣煩躁者死痢下數旬不解嘔噦足跗微腫若吐蛔者死問曰大便難何以所致答曰脾實則大便難虛則大便溏不溏不難其人必實健也潮熱便難若譫語若目中不了了者此為邪熱在裡也大承氣湯主之病人不大便六七日頭痛有熱者大承氣湯主之孩兒胸腹䐜脹硬滿大便不利此為乳癖所致也白花湯主之體羸肌燥大腸血乾大便硬者宜波淡花噉之波淡花一斤白糖一斤搗如泥盛壺密蓋每噉梅實大趹陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則難其脾為約麻仁丸主之麻仁丸方麻子仁四錢芍藥四錢大黃八錢厚朴二錢枳實一錢杏仁四錢上六味為末煉蜜為丸桐子大飲服十丸日三服漸加以和為度陽明病自汗出若發汗小便自利者此為津液內竭雖硬不可攻之當須自欲大便宜蜜煎導而通之蜜煎導方蜜七合一味內銅器中微火煎之稍凝似飴狀擾之勿令焦者欲可丸並手捻作挺令頭鋭大如指長二寸許當熱時急作冷則硬以內穀道中以手急抱欲大便時乃去之病人體羸血燥大便結燥者以熱湯內觸器乘熱而登須臾當肛潤使通也病人氣乏體羸腸內血燥大便必硬宜逐腸丸主之逐腸丸方巴豆四錢硫黃二錢檳榔二錢甘松二錢鐵落四錢大黃四錢上六味搗篩酒糊丸枳實大別蜀椒二錢以水二升煮取一升去滓洗掌中拭淨更塗胡麻油仍握一丸男左女右以大便通為度若不通更握新者或左右俱握若通而不禁者以冷水頻洗掌中便當頓止問曰小便不利者何謂也答曰膀胱以氣化理寒熱虛實其氣不行仍失轉化小便不利即是也病人脈數身熱渴而溲便澀者膀胱有客熱若脈澀而身微腫者此為風濕也病人腹硬脈沉而小便不利是癖塊令然也病人脈浮微熱消渴小便不利者五苓散主之身腫小便少水氣在皮膚中四肢聶聶動者宜防己茯苓湯防己茯苓湯方防己一錢黃耆一錢桂枝三分茯苓一錢甘草三分上五味以水二升煮取一升分溫三服風濕脈浮身重汗出惡風小便少者宜防己黃耆湯防己黃耆湯方防己一錢甘草三分白朮三分黃耆五分上銼麻豆大每抄二錢七生薑一片大棗一枚水盞半煎八分去滓分溫服風水惡風一身悉腫脈浮不渴續自汗出無大熱越婢湯主之越婢湯方麻黃一錢石膏一錢生薑三分大棗二枚甘草二分上五味以水二升先煮麻黃去上沫內諸藥煮取一升分溫三服身重從腰以上必汗出下無汗腰髖馳痛如有物在皮中狀劇者不能食身疼重煩燥小便不利者桂枝加黃耆湯主之病人溲便澀痛而旁射是膀胱熱也滑石湯主之滑石湯方滑石一錢芒硝三分柏實五分茯苓一錢甘草三分生薑三分上六味以水二升煮取一升去滓分溫服肚腹硬滿腰腳攣急而小便不利此脬痹也病人滲道癃閉所致腹滿短氣者蕁麻湯主之蕁麻湯方蕁麻一錢茯苓二錢豆黃卷三錢馬舄二錢甘草三分上五味以水二升煮取一升去滓分溫服病人元陽減耗胞胱乏轉化遂腹脹小便不利醫欲以淡滲利之是誤也得之反益劇短氣息迫宜折水湯主之折水湯方桑白皮一錢吳茱臾五分枳實七分檳榔一錢茯苓一錢縮砂五分香附五分附子三分生薑三分麥芽二錢上十味以水二升先煮麥芽減五合內諸藥煮取一升去滓分溫服病人胸腹大滿結熱不解若腳氣心悸俱與降氣散降氣散方田螺去殼黑炒一兩麝香三分上二味研均每錢七以白湯服之病腫脹稍解但足跗難消者宜附子煎附子煎方附子四錢樟腦四錢上二味以酒五升煎取三升溫熟頻頻尉之日五六次病人脬轉而小便不利者陰陽尉法主之疳瘕鼓滿小便不利者與黑散黑散方蝦蟆一兩縮砂一兩上二味為黑炒存性研篩以生薑湯服之病人小腹攣急心胸中動氣此為元臟虛也溺必如泔汁宜破故湯破故湯方破故一錢鹿角霜五分茯苓一錢連蕊三分紅曲五分甘草三分上六味以水二升煮取一升去滓分溫服病人胸腹腫滿如石硬雖體氣虛弱須先破之有故無害此為霸道也桃花煎破之桃花煎方茯苓一錢白朮三分枳實三分半夏一錢人參三分香附五分砂仁三分藿香五分甘草三分乾薑三分上十味以水二升煮白桃花一錢減五合內諸藥煮取一升去滓分溫服得泄利二三行為度後去桃花服本方小便當漸通也諸小便不利腫滿轉側不能者紅豆煎主之紅豆煎方紅豆炒一兩茯苓一錢枳實五分吳茱臾三分桑白皮五分檳榔五分白朮三分生薑三分上八味以水二升先煎紅豆減五合內諸藥再煎取一合去滓分溫服病人跗腫脈微口張氣粗額上汗出者死腫滿小便不利多脾虛煩悸而飲食不進者不可治問曰淋有五種者何謂也答曰淋之為病有寒有熱有血有石也又真臟大虛肚腹攣急而溺點者此名勞淋也陰頭痛而小便淋瀝其色如血者名曰熱淋也宜石葦湯石葦湯方石葦二錢滑石二錢茯苓五錢黃柏五分甘草三分上五味以水二升煮取一升去滓分溫服小便難澀而鮮血滴此為血淋後致膿淋也涼血湯主之涼血湯方小連翹五分當歸一錢芍藥一錢枳實五分桂枝三分桃仁三分生薑三分上七味以水二升煮取一升去滓分溫服身體冰冷其脈沉弦小便頻數或身微腫此名曰冷淋宜甘草附子湯主之甘草附子湯方甘草三分附子三分紅曲三分桂枝三分上四味以水二升煮取一升去滓分溫服血活則膀胱滋氣化則溲便行若氣血窒塞則滲道澀名曰氣淋也枳實湯主之枳實湯方枳實三分厚朴一錢茯苓一錢木香三分藿香三分糖霜二錢生薑三分上七味以水二升煮六味取一升去滓內糖霜攪調分溫服膀胱鬱結瘀濁致淋凝則為砂散則為膏宜海金砂湯主之海金砂湯方海金砂一錢琥珀五分茯苓五分糖霜五分大棗二枚生薑三分上六味以水二升煮取一升去滓分溫服發熱脈浮渴欲飲水溲便澀而不利者豬苓湯主之豬苓湯方豬苓茯苓阿膠滑石澤瀉各五分上五味以水二升先煮四味取一升去滓內阿膠煬消若嘔家去阿膠加蜂蜜分溫服五合日三服淋疾有熱膿多者為易治無熱膿點滴不盡者為難治問曰夢遺失精者何謂也答曰實壯人欲火盛而致夢遺者宜轉移其情想而愈也若羸弱人假火妄動而致遺泄者桂枝加龍骨牡蠣湯主之桂枝加龍骨牡蠣湯方桂枝三分芍藥一錢生薑三分甘草三分大棗二枚龍骨五分牡蠣一錢上七味以水二升煮取一升去滓分溫三服病人夢泄時目眩若腰腹弦急而痛此為牝臟虛宜安神丸鎮之安神丸方黃連六錢生地黃一錢當歸二錢硃砂五錢牛黃五分甘草一錢上六味為末蒸餅糊丸黍米大金箔為衣每服十五丸腎漏白淫頭眩振振胸間悸動強陰不倒此為虛火不皈其原也宜知柏枸杞飲知柏枸杞飲方知母二錢黃柏酒炒三分枸杞二錢食鹽二分甘草五分上五味以水二升煮取一升去滓分溫服病人二臟衰弱陰痿不振夢交精脫脈微沉細弦數起居勞汗出此為過極琢削所致也極祕滋陰膏主之極祕滋陰膏方反鼻黑炒七錢破故五錢縮砂十錢枸杞子八錢蓮蕊五錢萑肉八錢雞子黃十錢山茱萸八錢龍涎六錢夏草冬蟲五錢人參五分上十一味為極末先以燒酒二升煮雀肉雞子黃為膏更以蜂蜜二升燒酒八升與諸藥同煮為膏每服彈丸大問曰陰器疼痛者何謂也答曰陰器為恙有腫痛有隱痛此為牝臟毒火所致也陰物隱痛煩亂毒火所致者黑豆湯主之黑豆湯方黑豆一錢犀角五分甘草三分上三味以水二升煮二味減一升內犀角末攪調分溫服玉莖腫痛若隱痛恰如刀割動燥不安者宜甘草湯浸之甘草湯方甘草八錢食鹽一錢炒上二味以水五升煮取三升內竹筒適寒溫以浸玉莖冷易之日五六次以痛定為度論曰臀骨隱痛朝昏不解諸藥無療者伹灸法治之灸龜尾仍與柏皮湯論曰脬氣實則溲便適度虛則失其約名遺溺宜破故紙丸破故紙丸方破故紙二兩縮砂一兩附子半兩五倍子一兩黑炒甘草五錢上五味研篩酒糊丸桐子大以馬溺溫服遺溺若陰痿俱為牝臟虛冷所致宜破故紙酒服之破故紙酒方破故紙一兩縮砂一兩蓮蕊五錢上三味搗為末以燒酒一斗糖霜一斤同調均內壺密封七日酒熟每服二三合日三次師曰腎囊偏大漸長若腰腳攣急而痛名囊疝宿寒令然宜防風湯防風湯方防風一錢芍藥二錢烏頭霜五分甘草二分生薑二分上五味以水二升煮取一升去滓分溫服腰腳攣拘屈伸不任若行動跋跳其睪丸偏大者卵疝也與烏頭霜芍藥甘草附子湯亦服之烏頭霜方烏頭霜二兩白糖二兩上二味研調每一錢七以溫酒服之諸宿寒疝病若陰腫若腰冷宜當歸四逆加吳茱萸生薑湯陰囊腫大腰冷轉筋其脈沉伏此為厥疝大金鈴子丸主之大金鈴子丸方金鈴子去核四錢破故紙二錢附子一錢桂枝四錢吳茱萸一錢甘草一錢上六味搗篩以燒酒糊丸桐子大每服三十丸日二三次陰囊濕癢得溫氣反益劇者名腎臟風宜滲濕湯陰囊偏腫漸長大者宜牡蠣散塗之牡蠣散方牡蠣一錢上一味研篩以雞子清調和塗之日二三次腎臟風煩癢數旬難解者宜蛇狀子煎洗之蛇狀子煎方蛇狀子一錢白礬三錢烟草莖一兩上三味以水五升煮取三升以洗之冷則更溫洗日二三次以煩癢解為度身厥脈伏腰腹酷痛額汗出名寒疝宜烏頭煎主之烏頭煎方烏頭大者五枚熬去皮不㕮咀上一味以水三升煮取一升去滓內蜜二升煎令水盡取二升強人服七合弱人服五合不愈明日更服不可一日再服問曰緩風痿躄何謂也答曰南方多濕瘴氣所襲致腳痹者名曰緩風也緩風為恙食飲起居如故卒起腳屈弱者即是也腳弱頑麻若攣拘反不濕腫者名乾腳氣也腫者為濕腳氣劇者如瓜瓠也風濕身腫脈洪小便澀而腳弱者宜越婢加朮湯主之腳脛軟弱頑痹若轉筋胸滿短息者宜大檳榔湯大檳榔湯方檳榔一錢生薑二分青皮五分茯苓一錢厚朴一錢桑白皮一錢吳茱萸五分半夏一錢白芥子三分木瓜五分上十味以水二升煮取一升去滓分溫服腳腫漸長諸藥不禁者須急攻之後利滲道此謂劫其重勢也宜白花湯主之白花湯方白桃花一錢檳榔三分枳實三分茯苓五分麥芽炒一錢生薑三分上六味以水二升煮取一升去滓分溫服腳氣始起多不令人識飲食語言氣力如故惟漸頑痹蹎蹶寒風濕之病也腳氣奔騰毒氣鼓擊痰喘悸動息迫而欲死者宜與鐵漿支之腳氣毒入腹喘滿氣粗昏眩躁煩四肢厥寒脈沉伏者宜杉節湯主之杉節湯方杉節炒一錢白芥子一錢檳榔一錢枳實一錢生薑三分吳茱萸三分上六味以水二升煮取一升去滓分溫服論曰濁氣所襲深入髓元陽不能昫遂致疼痛此為寒濕宜烏頭桂枝湯主之烏頭桂枝湯方烏頭上一味以蜜二升煎減半去滓以桂枝湯一升解之服二合不知即服三合風濕血痹身體不仁若四肢痿弱者山萮菜湯主之山萮菜湯方山萮菜一錢防風一錢當歸一錢牛房子一錢甘草三分上五味以水二鍾煮取一鍾去滓分溫服發熱惡寒手腳關節掣痛名白虎歷節風風毒鼓擊所致也腳腫疼痛若痿躄脈洪數小便如血宜白虎加桂枝湯主之肢節疼痛身體尫羸腳腫如脫頭眩短氣溫溫欲吐桂枝芍藥知母湯主之桂枝芍藥知母湯方桂枝三分芍藥五分麻黃五分防風五分知母五分白朮五分附子三分甘草三分上九味以水二合煮取一合去滓分溫服歷節風病若腳氣攣急不可屈伸者宜烏頭湯烏頭湯方麻黃一錢芍藥一錢黃耆五分甘草三分川烏一錢㕮咀以蜜二升煎取一升即出烏頭上五味㕮咀以水二升煮四味取一升去滓內蜜煎中更煎之服三合不知再三服之寒濕疼痛腳脛攣拘熱腫若瘦削是屬鶴膝風也寬筋涼血湯主之寬筋涼血湯方防風威靈仙牛膝小蓮翹當歸各二錢寒水石芍藥各三錢甘草生薑各一錢上九味以水二升煮取一升去滓分溫服痢疾稍解反腳痛乏力此轉屬鶴膝也宜寬筋溫血湯主之寬筋溫血湯方防風牛膝當歸芍藥各一錢桂枝附子各七分甘草五分上七味以水二升煮取一升去滓分溫服風濕疼痛若血痹不仁若鶴膝痿弱諸身體頑麻俱宜麻黃膏服之麻黃膏方麻黃三兩桂枝一兩膠飴一斤上三味以酒一斗煮一味減二升去上沫及滓內膠飴再煮為膏每服彈丸大日五六次腰腳寒痹不仁痿弱身無大熱者宜芥子膏塗之芥子膏方白芥子不拘多少上一味研如泥溫酒調塗日二三次病人胸腹攣急而跖跛此為癇瘕若蟲塊所致宜以法治之體筋弛腳力空脫行動難支者宜三妙湯主之三妙湯方牛膝一錢黃柏三分炒知母一錢杜仲一錢破故紙一錢桂枝三分附子三分甘草三分生薑三分上九味以水二升煮取一升去滓分溫服腳氣痿躄雖夏月常須著綿裩至冬寒倍令兩脛溫暖得微汗為佳常令按摩數勞動關節令氣血通暢此拒風濕之法也陰虧則形壞故肢體為之廢弛膝臏腫大不能行步名曰鶴膝風血燥劇者不可治風痹寒濕痿痹偏廢若鶴膝膝臏疼痛如虎咬者宜樟木湯浴之樟木湯方樟木屑一斗桐木皮五升上二味以水一斛煎以浴痛處日七八次以痛定為度腳氣房勞虛乏小陰脈不至腎氣微少精血奔氣促迫上入胸膈者為難治腳氣衝心恍惚氣急四肢厥額汗出脈乍大乍小者不可治腳氣之為恙不得大補亦不可大瀉多由氣實而死氣虛者亦難治附録護養兒護養皆失於姑息富家過愛遂多夭橫貧家不及反得壽長兒受三分冷吃七分飽此為護養之要兒心胸要冷背腹要溫哭是歌不哭不僂儸也兒有胸無心病多從口成乳後勿與食食後勿與乳兒乳養欽者必致疳病藥補是不如食補也兒頭以涼為要足以溫為要體易虛易實勿服多寒勿服多熱兒敏解人意是真陽發泄恐難養兒瘦先撿乳餌一碗粥勝一斤參兒肌膚鮮明者有留飲宜滲泄方青暗者有寒毒宜溫散方兒額有筋而頸細身體乏力者屬疳病也宜赤風蛤噉之風者百病之長食者百治之原飲食不能者不可治兒妄笑者為心虛笑少者為心實兒谷腸多蟲乳腸少蟲有病者胎毒也兒穀氣勝於元氣者體肥而多病元氣勝於穀氣者體瘦而少病諸病解後脾胃必衰弱強食則發熱而腹滿是食復也病人貪食者當減也若惡者反要強何以論之曰食即惡之基惡者真元不支故也寒熱必有真假真者勿慢治假者勿拘泥病候有真假真者隱伏多在裡假者發見多在表兒吃熱勿吃寒吃軟勿吃硬吃少勿吃多醫有常變有寬急勿以常為變勿以變為常勿以寬為急勿以急為寬方有君臣有佐使勿以君為臣勿以臣為君勿以佐為使勿以使為佐方有多有單多者補澤所用也單者攻擊所用也致偏廢者有偏見也劑有寒因熱用有熱因寒用有寒因寒用有熱因熱用寒因熱用熱因寒用此為從治所用也寒因寒用熱因熱用此為反治所用也醫有反治有從治體實者反治所宜體虛者從治所宜反治者為常治從治者為變治問曰醫有逐機有持重何也答曰逐機者逐病侯而轉方也持重者重病因而不轉方也若識逐機者假令一日轉百方不為以誤也若識持重者假令百歲用一方亦不為以誤也凡診病者當以一級重決之也若以輕決之者必取敗缺也醫之為伎劑也易處病也難診若置其診而欲擬其劑者未可與論也兒病始吐蛔者為熱病當瘥終吐蛔者為寒病不可治問曰病熱用寒方益盛用熱方反安者何也答曰夏月體熱然反灌熱湯後身自涼也假令如火燒瘡急忍痛而灸後痛頓減此皆從治之類也問曰醫有從治有反治何謂也答曰熱用寒寒用熱此為反治熱用熱寒用寒此為從治病輕者反治所宜也病重者從治所宜也兒暴瀉昏沉脈微弦而四肢冷若驚惕者冬月易治夏月難治病始為實終為虛暴虛者易治漸虛者難治兒病多兼蛔以脾蟲故也始吐蛔者佳終吐蛔者不佳兒未期月而生者至腳弱以筋骨有所缺也醫伎非劑而在七以劑說治者未可與論也診病要在氣息氣息安靜者生短息者死癖塊有磨法無瀉法若妄攻者真元必傷不可治兒腹有塊者不問食癖蟲塊俱為惡侯須急論治診病以銀海為要虛實必顯以精萃所奏故也病五實者死五虛者亦死病多反復者不可治也
