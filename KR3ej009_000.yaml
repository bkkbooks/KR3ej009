front:
  text: 序人之所愛莫有過愛子者也而受之至不能無所憂憂之至莫有過憂其疾者也唯其疾是憂不知所以除之之道而可乎傳云有疾不擇醫為不慈不孝夫苟飲免不慈不孝之譏且莫如擇醫之良矣夫醫之為技不專其科則不能得也志分道岐盼一生技亦不能精也如甘繩之射寧越之學輪扁之劉輪佝僂丈人之承蜩可以觀也已自非神完守固外物不膠考何能有慧解哉是以醫之為技專門之士而往往有良言平安廣川子專業啞科來遊於吾崎留二歲術日大行即越人之通咸陽也豫頞好方脈之書廣川子清與豫交每或相會輒及脈家之說一日攜清人周士稱嬰兒論告曰某曩購此書實為獲異寶玩而驗之嚴驚疳癖諸症率皆無不奇中周氏之於小方脈可謂精矣豫欲附之剞劂以公於天下子幸賜辨一言可以行遠也豫受卒業乃欲曰周氏之精啞科猶業生鑑病於鏡臟腑癥結瞭然可知也蓋神完守固外物不膠而後得者也廣川子之獲之亦不異越人之遇長桑君斯筆之行也天下之受其子而憂其疾者必延熟斯書之醫則亦可不謂知所擇哉支然後庶哉免不慈之飢矣乎寬政丁己孟陬望日長崎吉村正隆士興題
